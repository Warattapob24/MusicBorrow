// ฟังก์ชันวาดกราฟ Real-time (ฉบับแก้ไข Race Condition)
async function initializeRealtimeChart() {
    const chartContainer = document.getElementById('realtimeChartContainer');
    const filter = document.getElementById('chart-interval-filter');
    if (!chartContainer || !filter) return;

    let chartInstance;
    let isRendering = false;

    // A base color palette for different instrument types
    const baseColorPalette = [
        'rgba(75, 192, 192, 1)',  // Green (เครื่องสาย)
        'rgba(54, 162, 235, 1)',  // Blue (เครื่องเป่าทองเหลือง)
        'rgba(255, 206, 86, 1)',  // Yellow (เครื่องเป่าลมไม้)
        'rgba(255, 99, 132, 1)',  // Red (เครื่องกระทบ)
        'rgba(153, 102, 255, 1)', // Purple (อุปกรณ์)
        'rgba(255, 159, 64, 1)',   // Orange (เครื่องลิ่มนิ้ว)
        'rgba(201, 203, 207, 1)'   // Grey (เครื่องเสียง)
    ];

    const renderChart = async () => {
        if (isRendering) return;
        isRendering = true;

        if (chartInstance) {
            chartInstance.destroy();
        }
        chartContainer.setAttribute('aria-busy', 'true');

        try {
            // --- 1. Fetch data for donut chart to establish a consistent color map ---
            const { data: donutData, error: donutError } = await supabase.rpc('get_borrow_counts_by_type');
            if (donutError) throw donutError;

            const typeColorMap = {};
            donutData.forEach((item, index) => {
                const color = baseColorPalette[index % baseColorPalette.length];
                typeColorMap[item.instrument_type] = color;
            });

            // --- 2. Fetch data for the main status chart ---
            const [totalMinutes, intervalMinutes] = filter.value.split('-').map(Number);
            const { data: statusData, error: statusError } = await supabase.rpc('get_borrow_status_by_type_over_time', {
                total_history_minutes: totalMinutes,
                interval_minutes: intervalMinutes
            });
            if (statusError) throw statusError;
            
            // --- 3. Process the data for Chart.js ---
            const timeSlots = [...new Set(statusData.map(d => d.time_slot))].sort();
            const labels = timeSlots.map(ts => new Date(ts).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }));
            const types = [...new Set(statusData.map(d => d.instrument_type))];
            
            // Create datasets for each instrument type
            const typeDatasets = types.map((type) => {
                const color = typeColorMap[type] || '#ccc';
                return {
                    label: type,
                    data: timeSlots.map(ts => statusData.find(d => d.time_slot === ts && d.instrument_type === type)?.borrowed_count || 0),
                    borderColor: color,
                    backgroundColor: color, // This ensures the legend box is solid
                    fill: false,
                    stepped: true, 
                    borderWidth: 2,
                    pointRadius: 0,
                };
            });

            // Create the "Total" dataset
            const totalData = timeSlots.map((ts) => {
                return types.reduce((sum, type) => {
                    const point = statusData.find(d => d.time_slot === ts && d.instrument_type === type);
                    return sum + (point ? point.borrowed_count : 0);
                }, 0);
            });

            const totalDataset = {
                label: 'รวมทั้งหมด',
                data: totalData,
                type: 'line',
                borderColor: 'rgba(45, 55, 72, 0.9)',
                backgroundColor: 'rgba(45, 55, 72, 0.1)',
                fill: true,
                stepped: true,
                borderWidth: 2.5,
                pointRadius: 0,
                order: 1 
            };

            chartContainer.innerHTML = '<canvas id="realtimeChart"></canvas>';
            const ctx = document.getElementById('realtimeChart').getContext('2d');

            // --- 4. Create the new chart with updated options ---
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [totalDataset, ...typeDatasets]
                },
                options: {
                    responsive: true, 
                    maintainAspectRatio: false,
                    // ✨✨✨ START: The Fix for Tooltip and Interaction ✨✨✨
                    interaction: {
                        mode: 'nearest', // Change interaction mode
                        intersect: true,   // Tooltip appears only on direct hover
                        axis: 'x'
                    },
                    plugins: {
                        tooltip: {
                            mode: 'nearest', // Change tooltip mode
                            intersect: true
                        },
                        legend: {
                            labels: {
                                usePointStyle: false, // Use rectangles for legend
                                boxWidth: 20 
                            }
                        }
                    },
                    // ✨✨✨ END: The Fix ✨✨✨
                    scales: { 
                        x: { grid: { display: false } },
                        y: { 
                            beginAtZero: true, 
                            stacked: false,
                            ticks: { 
                                stepSize: 1,
                                precision: 0 
                            }
                        } 
                    }
                }
            });

        } catch (err) {
            chartContainer.innerHTML = `<p style="color:red;">ไม่สามารถโหลดข้อมูลกราฟได้: ${err.message}</p>`;
        } finally {
            chartContainer.removeAttribute('aria-busy');
            isRendering = false;
        }
    };

    // Event listeners and initial call
    filter.removeEventListener('change', renderChart);
    filter.addEventListener('change', renderChart);
    await renderChart();

    // Real-time listener
    const channelName = `realtime-chart-${Date.now()}`;
    const channel = supabase.channel(channelName);
    
    channel.on('postgres_changes', { event: '*', schema: 'public', table: 'borrow_logs' }, () => {
        if (!isRendering) {
             renderChart();
        }
    }).subscribe();
}

async function initializeTypeChart() {
    const ctx = document.getElementById('typeChart')?.getContext('2d');
    if (!ctx) return;

    try {
        // เรียกใช้ RPC ใหม่ที่เราเพิ่งสร้าง
        const { data, error } = await supabase.rpc('get_borrow_counts_by_type');
        if (error) throw error;

        // เตรียมข้อมูลสำหรับ Chart.js
        const labels = data.map(item => item.instrument_type);
        const counts = data.map(item => item.borrow_count);
        
        // ชุดสีสำหรับกราฟ
        const chartColors = [
            '#4CAF50', '#2196F3', '#FFC107', '#F44336',
            '#9C27B0', '#009688', '#FF9800', '#795548'
        ];

        new Chart(ctx, {
            type: 'doughnut', // เลือกประเภทกราฟเป็นวงกลม (โดนัท)
            data: {
                labels: labels,
                datasets: [{
                    label: ' จำนวนการยืม',
                    data: counts,
                    backgroundColor: chartColors,
                    hoverOffset: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'top',
                    }
                }
            }
        });

    } catch (err) {
        const container = ctx.canvas.parentElement;
        if(container) container.innerHTML = `<p style="color:red">ไม่สามารถโหลดข้อมูลกราฟได้: ${err.message}</p>`;
    }
}

    if (!contentEl) return;

    try {
        const { data: notifications, error } = await supabase.rpc('get_user_notifications', { p_user_id: currentUser.id });
        if (error) throw error;

        if (!notifications || notifications.length === 0) {
            contentEl.innerHTML = '<p style="text-align:center; padding: 2rem 0;">ยังไม่มีการแจ้งเตือน</p>';

/**
 * ฟังก์ชันแม่แบบสำหรับสร้าง HTML ของตาราง Ranking ทั้งหมด (เวอร์ชันแก้ไขคอมเมนต์)
 * @param {Array} data - ข้อมูลอันดับที่ได้มาจาก Supabase RPC
 * @param {string} [footerText] - ข้อความเสริมที่จะแสดงท้ายตาราง (ถ้ามี)
 * @returns {string} โค้ด HTML ของตารางที่สมบูรณ์
 */
function createRankingTableHTML(data, footerText = '') {
    // Return a message if there's no data
    if (!data || data.length === 0) {
        return '<p style="text-align:center; padding: 1rem;">ยังไม่มีข้อมูลเวลาซ้อม</p>';
    }

    // Map the data to table rows
    const tableRows = data.map(row => {
        const isCurrentUserRow = row.is_current_user;
        // Use the existing 'user-rank-highlight' class to highlight the current user's row
        return `
            <tr ${isCurrentUserRow ? 'class="user-rank-highlight"' : ''}>
                <!-- Rank Column: Centered and narrow -->
                <td style="width: 1%; text-align: center;">${row.rank}</td>

                <!-- Name Column: Flexible width -->
                <td>${escapeHtml(row.full_name)} ${isCurrentUserRow ? '(คุณ)' : ''}</td>

                <!-- Time Column: Right-aligned with no wrapping -->
                <td style="width: 1%; white-space: nowrap; text-align: right;">${formatMinutesToHoursMinutes(row.total_minutes)}</td>
            </tr>`;
    }).join('');

    // Create the footer HTML if footerText is provided
    const footerHtml = footerText
        ? `<small style="margin-top: 0.5rem; text-align: right; display: block;">${footerText}</small>`
        : '';

    // Assemble the final table HTML with improved header styles
    return `
        <table role="grid">
            <thead>
                <tr>
                    <!-- Header for Rank -->
                    <th style="width: 1%; text-align: center; min-width: 120px;">อันดับ</th>

                    <!-- Header for Name -->
                    <th>ชื่อ</th>

                    <!-- Header for Time: Set a minimum width to prevent wrapping -->
                    <th style="text-align: right; min-width: 200px;">เวลาซ้อม (ชม.)</th>
                </tr>
            </thead>
            <tbody>${tableRows}</tbody>
        </table>
        ${footerHtml}
    `;
}

function createLeaderboardHtml(gameTitle, data) {
    if (!data) return `<p>${gameTitle}: ไม่สามารถโหลดข้อมูลได้</p>`;

    // แปลง group key เป็นข้อความที่อ่านง่าย
    const groupTranslations = {
        student: 'นักเรียน',
        club: 'ชุมนุม',
        teacher: 'ครู',
        guest: 'ทั่วไป'
    };

    const top10Rows = (data.top_10 || []).map(row => {
        // สร้างส่วนแสดงผลชื่อเล่นและกลุ่ม (ถ้ามี)
        const subtext = [row.nickname, row.class_level, groupTranslations[row.student_group]]
            .filter(Boolean) // กรองค่าที่ไม่มีออก
            .join(' • '); // เชื่อมด้วย •

        return `
        <tr>
            <td style="text-align: center;">${row.rank}</td>
            <td>
                ${escapeHtml(row.full_name)}
                <style="display: block; color: var(--pico-secondary);">(${escapeHtml(subtext)})</style>
            </td>
            <td style="text-align: right;">${row.highscore.toLocaleString()}</td>
        </tr>
    `}).join('');

    return `
        <h5 style="margin-bottom: 0.5rem;">${gameTitle}</h5>
        <p style="margin-bottom: 1rem;">คะแนนสูงสุดของคุณ: <strong>${data.user_highscore.toLocaleString()}</strong></p>
        <figure class="table-container" style="max-height: 250px; overflow-y: auto;">
            <table role="grid">
                <thead><tr><th style="text-align: center;">อันดับ</th><th>ชื่อ</th><th style="text-align: right;">คะแนน</th></tr></thead>
                <tbody>${top10Rows || '<tr><td colspan="3" style="text-align:center;">ยังไม่มีข้อมูลอันดับ</td></tr>'}</tbody>
            </table>
        </figure>
    `;
}

async function handleReturnInstrument(instrumentId, instrumentName, button) {
    const { isConfirmed, isDenied } = await Swal.fire({
        title: `คืน ${instrumentName}?`,
        text: "เครื่องดนตรีอยู่ในสภาพดีหรือไม่?",
        icon: 'question',
        showDenyButton: true,
        showCancelButton: true,
        confirmButtonText: '✅ สภาพดี, คืนเลย',
        denyButtonText: '❌ มีปัญหา, แจ้งซ่อม',
        cancelButtonText: 'ยกเลิก'
    });

    // --- Logic for normal return ---
    if (isConfirmed) {
        button.setAttribute('aria-busy', 'true');
        try {
            const { data, error } = await supabase.rpc('return_instrument_and_log_minutes', { 
                p_instrument_id: Number(instrumentId), 
                p_user_id: currentUser.id 
            });
            if (error) throw error;

            await Swal.fire('สำเร็จ!', data.message, 'success');
            
            // ✨✨✨ เริ่มส่วนเช็คเหรียญตราใหม่ ✨✨✨
            // ลบ await supabase.rpc('update_practice_streak', ...); และ checkForNewBadges(...) ของเก่าออก
            if (data.log_id) {
                const { data: newBadges } = await supabase.rpc('check_and_award_new_badges', {
                    p_user_id: currentUser.id,
                    p_log_id: data.log_id
                });

                if (newBadges && newBadges.length > 0) {
                    for (const badge of newBadges) {
                        Swal.fire({
                            toast: true,
                            position: 'top-end',
                            icon: 'success',
                            title: 'ได้รับเหรียญตราใหม่!',
                            html: `<b>${escapeHtml(badge.badge_name)}</b>`,
                            showConfirmButton: false,
                            timer: 4000
                        });
                    }
                    renderMyBadges(currentUser.id);
                }
            }
            // ✨✨✨ จบส่วนเช็คเหรียญตราใหม่ ✨✨✨

        } catch (error) {
            await Swal.fire('ผิดพลาด!', error.message, 'error');
        } finally {
            await refreshOnReturn();
            button.removeAttribute('aria-busy');
        }
    }

    // --- Logic for returning with a repair report ---
    if (isDenied) {
        const { value: problemDescription } = await Swal.fire({
            title: 'แจ้งซ่อม ' + instrumentName,
            input: 'textarea',
            inputLabel: 'กรุณาอธิบายอาการชำรุด',
            inputPlaceholder: 'เช่น สาย 1 ขาด, มีรอยร้าว...',
            showCancelButton: true,
            confirmButtonText: 'ยืนยันการแจ้งซ่อม',
            inputValidator: (value) => !value && 'กรุณาอธิบายปัญหา!'
        });
        if (problemDescription) {
            button.setAttribute('aria-busy', 'true');
            try {
                const { data, error } = await supabase.rpc('return_instrument_and_log_minutes', {
                    p_instrument_id: Number(instrumentId), 
                    p_user_id: currentUser.id, 
                    p_problem_description: problemDescription
                });
                if (error) throw error;
                
                await Swal.fire('ขอบคุณสำหรับข้อมูล!', data.message, 'success');

                // ✨✨✨ เพิ่มส่วนเช็คเหรียญตราใหม่ตรงนี้ด้วย ✨✨✨
                if (data.log_id) {
                    const { data: newBadges } = await supabase.rpc('check_and_award_new_badges', {
                        p_user_id: currentUser.id,
                        p_log_id: data.log_id
                    });

                    if (newBadges && newBadges.length > 0) {
                        for (const badge of newBadges) {
                            Swal.fire({
                                toast: true,
                                position: 'top-end',
                                icon: 'success',
                                title: 'ได้รับเหรียญตราใหม่!',
                                html: `<b>${escapeHtml(badge.badge_name)}</b>`,
                                showConfirmButton: false,
                                timer: 4000
                            });
                        }
                        renderMyBadges(currentUser.id);
                    }
                }
                // ✨✨✨ จบส่วนเช็คเหรียญตราใหม่ ✨✨✨

            } catch (error) {
                await Swal.fire('ผิดพลาด!', error.message, 'error');
            } finally {
                await refreshOnReturn();
                // We don't need to remove the busy attribute here because the button might not exist
                // if called from a different context, but it's safe to leave as is.
            }
        }
    }
}

                        </select>
                    </label>
                    <div id="main-instrument-field" class="${userData.student_group === 'club' ? '' : 'hidden'}">
                        <label>เครื่องดนตรีหลัก<input id="swal-main-instrument" class="swal2-input" value="${escapeHtml(userData.main_instrument || '')}"></label>
                    </div>
                    <hr>
                    <label>อัปโหลดรูปโปรไฟล์ใหม่</label>
                    <input id="swal-profile-file-admin" type="file" class="swal2-file" accept="image/*">
                </div>`,
            width: '45rem',
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: 'บันทึกการแก้ไข',
            cancelButtonText: 'ยกเลิก',
            didOpen: () => {
                document.getElementById('swal-group')?.addEventListener('change', (e) => {
                    document.getElementById('main-instrument-field')?.classList.toggle('hidden', e.target.value !== 'club');
                });
            },
            preConfirm: () => {
                const firstName = document.getElementById('swal-firstname').value;
                const lastName = document.getElementById('swal-lastname').value;
                if (!firstName || !lastName) {
                    Swal.showValidationMessage('กรุณากรอกชื่อและนามสกุล');
                    return false;
                }
                return {
                    p_prefix: document.getElementById('swal-prefix').value,
                    p_first_name: firstName,
                    p_last_name: lastName,
                    p_nickname: document.getElementById('swal-nickname').value || null,
                    p_student_group: document.getElementById('swal-group').value,
                    p_student_id: document.getElementById('swal-studentid').value || null,
                    p_class_level: document.getElementById('swal-classlevel').value || null,
                    p_phone_number: document.getElementById('swal-phone').value || null,
                    p_line_id: document.getElementById('swal-lineid').value || null,
                    p_main_instrument: document.getElementById('swal-main-instrument').value || null,
                    p_birth_date: document.getElementById('swal-birthdate').value || null, // ✨ เพิ่มการดึงข้อมูลวันเกิด
                    imageFile: document.getElementById('swal-profile-file-admin').files[0] // ✨ เพิ่มการดึงไฟล์รูป
                };
            }
        });

        if (formValues) {
            Swal.showLoading();
            let finalImageUrl = userData.profile_image_url;

            // ✨ เพิ่ม Logic การอัปโหลดรูป
            if (formValues.imageFile) {
                const file = formValues.imageFile;
                const filePath = `${userId}.jpg`;
                const { error: uploadError } = await supabase.storage.from('profile-images').upload(filePath, file, { upsert: true });
                if (uploadError) throw new Error(`อัปโหลดรูปโปรไฟล์ล้มเหลว: ${uploadError.message}`);
                finalImageUrl = `${supabase.storage.from('profile-images').getPublicUrl(filePath).data.publicUrl}?t=${new Date().getTime()}`;
            }

            const payload = { 
                p_user_id: userId, 
                ...formValues,
                p_profile_image_url: finalImageUrl // ✨ ส่ง URL รูปใหม่ไปกับ payload
            };
            delete payload.imageFile; // ลบไฟล์ออกจาก payload ก่อนส่งไปที่ RPC

            const { error } = await supabase.rpc('update_user_profile_by_admin', payload);
            if (error) throw error;
            
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'success',
                title: 'แก้ไขข้อมูลผู้ใช้เรียบร้อยแล้ว',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true
            });
            
            await refreshUserManagementModal();
        }
    } catch (err) {
        Swal.fire('เกิดข้อผิดพลาด', `ไม่สามารถโหลดหรือแก้ไขข้อมูลผู้ใช้ได้: ${err.message}`, 'error');
    }
}

async function handleEditKnowledgeLink(linkId, currentTitle, currentUrl, currentType) {
    // ดึงประเภทเครื่องดนตรีทั้งหมดมาสร้างตัวเลือก
    const { data: instruments, error: typeError } = await supabase.from('instruments').select('type').order('type');
    if (typeError) {
        Swal.fire('ผิดพลาด', 'ไม่สามารถโหลดประเภทเครื่องดนตรีได้', 'error');
        return;
    }
    const uniqueTypes = [...new Set(instruments.map(i => i.type).filter(Boolean))];
    const typeOptionsHtml = `
        <option value="" ${!currentType ? 'selected' : ''}>-- สำหรับทุกประเภท --</option>
        ${uniqueTypes.map(type => `<option value="${escapeHtml(type)}" ${currentType === type ? 'selected' : ''}>${escapeHtml(type)}</option>`).join('')}
    `;

    const { value: formValues } = await Swal.fire({
        title: 'แก้ไขข้อมูลลิงก์',
        html: `
            <div style="text-align:left;">
                <label for="swal-kn-title">ชื่อคลิป/หัวข้อ*</label>
                <input id="swal-kn-title" class="swal2-input" value="${escapeHtml(currentTitle)}" required>
                
                <label for="swal-kn-url">ลิงก์ YouTube*</label>
                <input id="swal-kn-url" type="url" class="swal2-input" value="${escapeHtml(currentUrl)}" required>

                <label for="swal-kn-type">ประเภท*</label>
                <select id="swal-kn-type" class="swal2-input">${typeOptionsHtml}</select>
            </div>`,
        focusConfirm: false,
        showCancelButton: true,
        confirmButtonText: 'บันทึกการแก้ไข',
        preConfirm: () => {
            return {
                title: document.getElementById('swal-kn-title').value,
                youtube_url: document.getElementById('swal-kn-url').value,
                instrument_type: document.getElementById('swal-kn-type').value || null
            };
        }
    });

    if (formValues) {
        Swal.showLoading();
        try {
            const { error } = await supabase.from('knowledge_links').update(formValues).eq('id', linkId);
            if (error) throw error;
            await Swal.fire('สำเร็จ!', 'แก้ไขข้อมูลลิงก์เรียบร้อยแล้ว', 'success');

        } catch (err) {
            await Swal.fire('ผิดพลาด!', err.message, 'error');
        }
    }
}

async function handleManageKnowledge() {
    Swal.fire({
        title: 'จัดการคลังความรู้',
        html: `<div id="swal-knowledge-admin-content" aria-busy="true" style="min-height:400px; text-align:left;">กำลังโหลดข้อมูล...</div>`,
        width: '80%',
        showConfirmButton: false,
        showCloseButton: true,
        didOpen: async () => {
            const container = document.getElementById('swal-knowledge-admin-content');
            const modal = Swal.getPopup();
            if (!container || !modal) return;

            try {
                // 1. ดึงข้อมูลลิงก์และประเภทเครื่องดนตรี
                const { data: allLinks, error: linksError } = await supabase
                    .from('knowledge_links')
                    .select('*, users(first_name, last_name)')
                    .order('created_at', { ascending: false });
                if (linksError) throw linksError;

                const { data: instruments, error: typeError } = await supabase.from('instruments').select('type').order('type');
                if (typeError) throw typeError;
                const uniqueTypes = [...new Set(instruments.map(i => i.type).filter(Boolean))];
                const typeOptionsHtml = `
                    <option value="">-- สำหรับทุกประเภท --</option>
                    ${uniqueTypes.map(type => `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`).join('')}
                `;

                // 2. แยกข้อมูลเป็นสองกลุ่ม
                const pendingLinks = allLinks.filter(link => !link.is_approved);
                const approvedLinks = allLinks.filter(link => link.is_approved);

                // 3. สร้าง HTML สำหรับแต่ละส่วน
                const pendingHtml = pendingLinks.length > 0 ? pendingLinks.map(link => `
                    <li class="knowledge-list-item">
                        <div><strong>${escapeHtml(link.title)}</strong><br><small>โดย: ${escapeHtml(link.users?.first_name || 'N/A')}</small></div>
                        <div class="button-group">
                            <button class="approve-knowledge-btn icon-button" data-id="${link.id}" title="อนุมัติ">${ICONS.check}</button>
                            <button class="reject-knowledge-btn icon-button secondary" data-id="${link.id}" title="ปฏิเสธ">${ICONS.x}</button>
                        </div>
                    </li>`).join('') : '<li><p style="text-align:center; padding:1rem 0;">ไม่มีรายการรอตรวจสอบ</p></li>';

                const approvedHtml = approvedLinks.length > 0 ? approvedLinks.map(link => `
                    <li class="knowledge-list-item">
                        <div>
                            <strong>${escapeHtml(link.title)}</strong><br>
                            <small>ประเภท: ${escapeHtml(link.instrument_type || 'สำหรับทุกประเภท')}</small>
                        </div>
                        <div class="button-group">
                            <button class="admin-edit-knowledge-btn icon-button" data-id="${link.id}" data-title="${escapeHtml(link.title)}" data-url="${escapeHtml(link.youtube_url)}" data-type="${escapeHtml(link.instrument_type || '')}" title="แก้ไข">${ICONS.edit}</button>
                            <button class="delete-knowledge-btn icon-button secondary" data-id="${link.id}" title="ลบ"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg></button>
                        </div>
                    </li>`).join('') : '<li><p style="text-align:center; padding:1rem 0;">ยังไม่มีลิงก์ในคลังความรู้</p></li>';

                const adminAddFormHtml = `
                    <form id="add-knowledge-form" style="text-align:left; margin-top:1.5rem; padding-top:1.5rem; border-top: 1px solid var(--pico-muted-border-color);">
                        <h6>เพิ่มลิงก์โดยแอดมิน</h6>
                        <div class="grid">
                            <div><label for="kn-type">ประเภท</label><select id="kn-type">${typeOptionsHtml}</select></div>
                            <div><label for="kn-title">ชื่อคลิป*</label><input type="text" id="kn-title" placeholder="เช่น สอนจับคอร์ด C" required></div>
                        </div>
                        <label for="kn-url">ลิงก์ YouTube*</label>
                        <input type="url" id="kn-url" placeholder="https://www.youtube.com/..." required>
                        <button type="submit" class="contrast" style="margin-top:1rem;">เพิ่มลิงก์</button>
                    </form>`;

                // 4. ประกอบร่าง HTML ทั้งหมด
                container.innerHTML = `
                    <style>
                        .knowledge-list-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--pico-muted-border-color); }
                        .knowledge-list-item .button-group { display: flex; gap: 0.5rem; align-items: center; flex-shrink: 0; }
                    </style>
                    <section>
                        <h5><span style="color:var(--pico-color-amber-500)">🟡</span> รายการรอตรวจสอบ</h5>
                        <ul style="list-style:none; padding:0;">${pendingHtml}</ul>
                    </section>
                    <hr>
                    <section>
                        <h5><span style="color:var(--pico-color-green-500)">🟢</span> ลิงก์ที่อนุมัติแล้ว</h5>
                        <ul style="list-style:none; padding:0;">${approvedHtml}</ul>
                    </section>
                    ${adminAddFormHtml}
                `;
                container.removeAttribute('aria-busy');
                
                // 5. เพิ่ม Event Listeners
                modal.addEventListener('click', (e) => {
                    const editBtn = e.target.closest('.admin-edit-knowledge-btn');
                    const approveBtn = e.target.closest('.approve-knowledge-btn');
                    const rejectBtn = e.target.closest('.reject-knowledge-btn');
                    const deleteBtn = e.target.closest('.delete-knowledge-btn');

                    if (editBtn) {
                        handleEditKnowledgeLink(editBtn.dataset.id, editBtn.dataset.title, editBtn.dataset.url, editBtn.dataset.type);
                    } else if (approveBtn) {
                        Swal.showLoading();
                        supabase.from('knowledge_links').update({ is_approved: true }).eq('id', approveBtn.dataset.id)
                            .then(({ error }) => {
                                if (error) throw error;
                                handleManageKnowledge();
                            }).catch(err => Swal.fire('ผิดพลาด', err.message, 'error'));
                    } else if (rejectBtn || deleteBtn) {
                        const linkId = (rejectBtn || deleteBtn).dataset.id;
                        const text = rejectBtn ? "ลิงก์ที่เสนอมานี้จะถูกลบออกไป" : "คุณต้องการลบลิงก์นี้ใช่ไหม?";
                        Swal.fire({ title: 'ยืนยันการลบ?', text, icon: 'warning', showCancelButton: true, confirmButtonText: 'ใช่, ลบเลย' })
                            .then(result => {

async function processQrScan(instrumentId) {
    // ✨ 1. ตรวจสอบสิทธิ์ก่อนเป็นอันดับแรก ✨
    if (currentUser && currentUser.role === 'admin') {
        // ถ้าเป็นแอดมิน ให้แสดงหน้าประวัติเครื่องดนตรีทันที
        renderInstrumentHistoryModal(instrumentId);
        return; // จบการทำงาน ไม่ต้องทำอะไรต่อ
    }

    // --- ถ้าไม่ใช่แอดมิน จะทำงานตาม Logic เดิมด้านล่าง ---

    if (!currentUser) {
        sessionStorage.setItem('pendingScanId', instrumentId);
        return Swal.fire('กรุณาล็อกอิน', 'คุณต้องเข้าสู่ระบบก่อนทำรายการผ่าน QR Code', 'info');
    }

    Swal.fire({
        title: 'กำลังตรวจสอบข้อมูล QR Code...',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
    });

    try {
        const { data: result, error: fetchError } = await supabase.rpc('get_instrument_scan_details', { 
            p_instrument_id: Number(instrumentId) 
        });

        if (fetchError) throw fetchError;
        if (!result) throw new Error(`ไม่พบเครื่องดนตรี ID: ${instrumentId} ในระบบ`);

        const { instrument_name, status, is_borrowed_by_current_user } = result;

        if (status === 'พร้อมใช้งาน') {
            // --- ✨✨✨ ส่วนการยืมที่หายไป ✨✨✨ ---
            if (currentUser.is_blocked) return Swal.fire('บัญชีถูกระงับ', `คุณถูกระงับการใช้งานเนื่องจาก: ${currentUser.block_reason || 'ไม่ระบุ'}`, 'error');

            const { isConfirmed } = await Swal.fire({
                title: `ยืม ${escapeHtml(instrument_name)}?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'ใช่, ยืมเลย',
                cancelButtonText: 'ยกเลิก'
            });

            if (isConfirmed) {
                Swal.showLoading();
                const { data, error } = await supabase.rpc('borrow_instrument_atomic', {
                    p_instrument_id: Number(instrumentId),
                    p_user_id: currentUser.id,
                    p_is_take_home: false, // การสแกนยืมถือเป็นการยืมในโรงเรียนเสมอ
                    p_due_date: null,
                    p_parent_acknowledged: false
                });
                if (error) throw error;
                await Swal.fire('สำเร็จ!', data.message, 'success');
                await refreshOnReturn();
            }

        } else if (status === 'ถูกยืมอยู่' && is_borrowed_by_current_user) {
            // --- ✨✨✨ ส่วนการคืนที่หายไป ✨✨✨ ---
            // document.body ถูกใช้เป็น button placeholder ชั่วคราว
            handleReturnInstrument(instrumentId, instrument_name, document.body);

        } else {
            Swal.fire('ไม่พร้อมใช้งาน', `"${escapeHtml(instrument_name)}" อยู่ในสถานะ "${escapeHtml(status)}"`, 'warning');
        }

    } catch (err) {
        Swal.fire('เกิดข้อผิดพลาด!', err.message, 'error');
    }
}

                Swal.showValidationMessage('กรุณากรอกข้อมูลที่มีเครื่องหมาย * ให้ครบถ้วน');
                return false; // หยุดการส่งฟอร์มถ้าข้อมูลไม่ครบ
            }
            return {
                prefix,
                firstname: firstname,
                lastname: lastname,
                birth_date: birthdate,
                nickname: document.getElementById('swal-nickname').value || null,
                phone_number: document.getElementById('swal-phone').value || null,
                student_group: document.getElementById('swal-group').value,
                student_id: document.getElementById('swal-studentid').value || null,
                class_level: document.getElementById('swal-classlevel').value || null,
                main_instrument: document.getElementById('swal-maininstrument').value || null,
            };
        }
    });

    // --- ตรรกะหลังการกดปุ่ม ---
    if (isConfirmed && formValues) {
        // ถ้าผู้ใช้กดยืนยันและข้อมูลถูกต้อง ให้สร้างโปรไฟล์
        Swal.showLoading();
        try {
            const profileData = {
                id: user.id,
                email: user.email,
                role: 'student', // Default role
                profile_image_url: user.user_metadata.avatar_url, // Get image from Google
                ...formValues
            };
            const { error } = await supabase.from('users').insert(profileData);
            if (error) throw error;
            
            await Swal.fire('สำเร็จ!', 'ลงทะเบียนเรียบร้อยแล้ว', 'success');
            window.location.reload(); // รีโหลดเพื่อเข้าสู่ระบบอย่างสมบูรณ์

        } catch (err) {
            await Swal.fire('ผิดพลาด!', 'ไม่สามารถบันทึกโปรไฟล์ได้: ' + err.message, 'error');
            await supabase.auth.signOut(); // ถ้าพลาด ให้ออกจากระบบ
        }
    } else {
        // ถ้าผู้ใช้กดยกเลิกหรือปิดหน้าต่าง ให้บังคับออกจากระบบ
        await supabase.auth.signOut();
    }
}

async function handleManageBadges(userId, userName) {
    const masterView = document.getElementById('modal-master-view');
    const detailView = document.getElementById('modal-detail-view');
    
    // ✨ 1. บันทึกตำแหน่ง scroll ของหน้ารายชื่อผู้ใช้ ✨
    const userListContainer = document.getElementById('modal-user-list-container');
    const savedScrollTop = userListContainer ? userListContainer.scrollTop : 0;

    masterView.classList.add('hidden');
    detailView.classList.remove('hidden');
    detailView.innerHTML = `<div aria-busy="true">กำลังโหลดข้อมูลเหรียญตราของ ${escapeHtml(userName)}...</div>`;

    try {
        const { data: allManualBadges, error: defsError } = await supabase
            .from('badge_definitions')
            .select('badge_name, badge_description') // ✨ ดึงคำอธิบายมาด้วย
            .eq('award_method', 'manual');
        if (defsError) throw defsError;

        // ✨ 2. ดึงข้อมูลเหรียญของผู้ใช้พร้อมคำอธิบาย ✨
        const { data: awardedBadges, error: awardedError } = await supabase
            .from('badges')
            .select('badge_name, badge_description') // <-- ดึงคำอธิบายมาด้วย
            .eq('user_id', userId);
        if (awardedError) throw awardedError;
        
        const awardedBadgeNames = awardedBadges.map(b => b.badge_name);
        const availableBadges = allManualBadges.filter(b => !awardedBadgeNames.includes(b.badge_name));

        // ✨ 3. แสดงคำอธิบายของเหรียญที่มีอยู่ ✨
        const existingBadgesHtml = awardedBadges.length > 0
            ? awardedBadges.map(b => `
                <li style="opacity: 0.7; margin-bottom: 0.5rem; border-bottom: 1px dashed var(--pico-muted-border-color);">
                    🏅 <strong>${escapeHtml(b.badge_name)}</strong>
                    <small style="display: block; padding-left: 2em; left: 0;">${escapeHtml(b.badge_description || '(ไม่มีคำอธิบาย)')}</small>
                </li>`).join('')
            : '<li>ยังไม่มีเหรียญตรา</li>';
        
        const awardFormHtml = availableBadges.length > 0 ? `
            <form id="award-badge-form" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--pico-muted-border-color);">
                <h6>มอบเหรียญตราใหม่</h6>
                <label for="swal-badge-name">เลือกเหรียญตราที่จะมอบ</label>
                <select id="swal-badge-name" required>
                    ${availableBadges.map(b => `<option value="${b.badge_name}">${b.badge_name}</option>`).join('')}
                </select>
                <button type="submit" class="contrast">ยืนยันการมอบ</button>
            </form>
        ` : '<p style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--pico-muted-border-color);"><em>ผู้ใช้ได้รับเหรียญตราเกียรติยศครบทุกประเภทแล้ว!</em></p>';

        detailView.innerHTML = `
            <div style="text-align:left;">
                <button id="back-to-master-btn" class="secondary outline" style="margin-bottom:1rem;">← กลับไปที่รายชื่อ</button>
                <h4>จัดการเหรียญตรา: ${escapeHtml(userName)}</h4>
                <article style="padding:1rem; background-color: var(--pico-muted-background-color);">
                    <h5>เหรียญตราที่มีอยู่</h5>
                    <ul style="list-style-type: none; padding-left: 0; margin:0;">${existingBadgesHtml}</ul>
                    ${awardFormHtml}
                </article>
            </div>
        `;

        // ✨ 4. ทำให้ปุ่ม "กลับ" จำตำแหน่ง scroll เดิมได้ ✨
        detailView.querySelector('#back-to-master-btn')?.addEventListener('click', () => {
            detailView.classList.add('hidden');
            masterView.classList.remove('hidden');
            if(userListContainer) {
                userListContainer.scrollTop = savedScrollTop;
            }
        });

        detailView.querySelector('#award-badge-form')?.addEventListener('submit', async (e) => {
             e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.setAttribute('aria-busy', 'true');
            const badgeNameToAward = e.target.querySelector('#swal-badge-name').value;
            const badgeDefinition = allManualBadges.find(b => b.badge_name === badgeNameToAward);

            try {
                const { error } = await supabase.from('badges').insert({
                    user_id: userId,
                    badge_name: badgeNameToAward,
                    badge_description: badgeDefinition?.badge_description
                });
                if (error) throw error;
                await Swal.fire({ icon: 'success', title: 'มอบเหรียญตราสำเร็จ!', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
                
                handleManageBadges(userId, userName);
                
            } catch(err) {
                await Swal.fire('ผิดพลาด', err.message, 'error');
            } finally {
                btn.removeAttribute('aria-busy');
            }
        });
    } catch (err) {
        detailView.innerHTML = `<p class="error">เกิดข้อผิดพลาด: ${err.message}</p><button id="back-to-master-btn" class="secondary outline">← กลับ</button>`;
        detailView.querySelector('#back-to-master-btn')?.addEventListener('click', () => {
            detailView.classList.add('hidden');
            masterView.classList.remove('hidden');
        });
    }
}

/**
 * จัดการการเพิ่มนิยามเหรียญตราใหม่
 */
async function handleAddNewBadgeDef(form) {
    const formData = new FormData(form);
    const badgeDef = Object.fromEntries(formData.entries());
    // Convert empty strings to null for database
    for (const key in badgeDef) {
        if (badgeDef[key] === '') badgeDef[key] = null;
    }

    try {
        const { error } = await supabase.from('badge_definitions').insert(badgeDef);
        if (error) throw error;
        await Swal.fire('สำเร็จ!', 'เพิ่มนิยามเหรียญตราใหม่เรียบร้อย', 'success');
        handleManageBadgeDefinitions(); // Refresh the modal
    } catch (err) {
        await Swal.fire('ผิดพลาด!', err.message, 'error');
    }
}

// เพิ่มฟังก์ชันใหม่นี้เข้าไป
function handleUniversalScan() {
    Swal.fire({
        title: 'สแกน QR Code',
        html: '<div id="qr-reader" style="width: 100%; max-width: 400px; margin: auto;"></div>',
        showCancelButton: true,
        cancelButtonText: 'ยกเลิก',
        showConfirmButton: false,
        didOpen: () => {
            const html5QrCode = new Html5Qrcode("qr-reader");
            const qrCodeSuccessCallback = (decodedText, decodedResult) => {
                html5QrCode.stop().then(() => {
                    Swal.close();
                    const urlParams = new URLSearchParams(new URL(decodedText).search);
                    const instrumentId = urlParams.get('scan');
                    if (!instrumentId) {
                        return Swal.fire('ผิดพลาด', 'QR Code ไม่ถูกต้อง', 'error');
                    }

                    // ✨ Logic อัจฉริยะอยู่ตรงนี้ ✨
                    if (currentUser.role === 'admin') {
                        // ถ้าเป็นแอดมิน ให้แสดงประวัติ
                        renderInstrumentHistoryModal(instrumentId);
                    } else {
                        // ถ้าเป็นผู้ใช้ทั่วไป ให้เข้าสู่กระบวนการยืม/คืน
                        processQrScan(instrumentId);
                    }
                }).catch(err => console.error("Failed to stop QR scanner:", err));
            };
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
                .catch(err => Swal.fire('ผิดพลาด', 'ไม่สามารถเปิดกล้องได้', 'error'));
        }
    });
}

        const historyHtml = history.length > 0 ? history.map(log => {

// ===== [โค้ดจูนเนอร์ชุดใหม่] - วางทับของเดิมทั้งหมดได้เลยครับ =====
// =======================================================================

// --- ตัวแปรและค่าคงที่ ---
const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
let tunerState = {
    audioContext: null,
    stream: null,
    analyserNode: null,
    animationFrameId: null,
    isInitialized: false,
    dataArray: null
};

// --- ฟังก์ชันตัวช่วย ---
function getNoteFromPitch(frequency, refPitch) { // ✨ [อัปเดต] เพิ่ม refPitch
    if (frequency === -1) return "--";
    const noteNum = 12 * (Math.log(frequency / refPitch) / Math.log(2));
    return Math.round(noteNum) + 69;
}

function getNoteString(noteNum) {
    if (noteNum === "--") return "--";
    return noteStrings[noteNum % 12];
}

function getCents(frequency, noteNum, refPitch) { // ✨ [อัปเดต] เพิ่ม refPitch
    if (frequency === -1 || noteNum === "--") return "-";
    const standardFrequency = refPitch * Math.pow(2, (noteNum - 69) / 12);
    return Math.floor(1200 * Math.log(frequency / standardFrequency) / Math.log(2));
}

// --- ฟังก์ชันหลักในการวิเคราะห์ Pitch (อัลกอริทึม Autocorrelation) ---
function autoCorrelate(buf, sampleRate) {
    const SIZE = buf.length;
    const rms = Math.sqrt(buf.reduce((sum, val) => sum + val * val, 0) / SIZE);
    if (rms < 0.01) return -1; // ไม่พบเสียงที่ดังพอ

    let r1 = 0, r2 = SIZE - 1, thres = 0.2;
    for (let i = 0; i < SIZE / 2; i++) {
        if (Math.abs(buf[i]) < thres) { r1 = i; break; }
    }
    for (let i = 1; i < SIZE / 2; i++) {
        if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
    }

    buf = buf.slice(r1, r2);
    const newSize = buf.length;
    const c = new Array(newSize).fill(0);

    for (let i = 0; i < newSize; i++) {
        for (let j = 0; j < newSize - i; j++) {
            c[i] = c[i] + buf[j] * buf[j + i];
        }
    }

    let d = 0;
    while (d < c.length && c[d] > c[d + 1]) d++;
    
    let maxval = -1, maxpos = -1;
    for (let i = d; i < newSize; i++) {
        if (c[i] > maxval) {
            maxval = c[i];
            maxpos = i;
        }
    }

    let T0 = maxpos;
    const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
    const a = (x1 + x3 - 2 * x2) / 2;
    const b = (x3 - x1) / 2;
    if (a) T0 = T0 - b / (2 * a);

    return sampleRate / T0;
}


// --- ฟังก์ชันหลักสำหรับควบคุมและติดตั้งจูนเนอร์ ---
function setupNativeTuner() {
    const tunerElement = document.getElementById('native-tuner');
    if (!tunerElement) return;

    // อ้างอิง Element ที่จำเป็น
    const noteNameEl = tunerElement.querySelector('.tuner-note-name');
    const freqEl = tunerElement.querySelector('.tuner-freq-display');
    const centEl = tunerElement.querySelector('.tuner-cent-display');
    const indicatorEl = tunerElement.querySelector('.tuner-indicator');
    const toggleBtn = document.getElementById('toggle-tuner-btn'); 
    const refPitchInput = document.getElementById('reference-pitch-input');

    let currentRefPitch = parseFloat(refPitchInput.value); 

    refPitchInput.addEventListener('input', () => {
        currentRefPitch = parseFloat(refPitchInput.value) || 440;
    });

    // ฟังก์ชันอัปเดตหน้าจอจูนเนอร์
const updateTunerDisplay = () => {
    if (!tunerState.isInitialized) return;

    tunerState.analyserNode.getFloatTimeDomainData(tunerState.dataArray);
    const pitch = autoCorrelate(tunerState.dataArray, tunerState.audioContext.sampleRate);
    
    // อ้างอิงถึง Element ของตัวโน้ต
    const noteNameEl = tunerElement.querySelector('.tuner-note-name');

    if (pitch !== -1) {
        const noteNum = getNoteFromPitch(pitch, currentRefPitch);
        const noteStr = getNoteString(noteNum);
        const cents = getCents(pitch, noteNum, currentRefPitch);

        noteNameEl.textContent = noteStr.replace("#", "♯");
        freqEl.textContent = `${pitch.toFixed(1)} Hz`;
        centEl.textContent = `${cents} cents`;
        
        const maxDetune = 50;
        const clampedDetune = Math.max(-maxDetune, Math.min(maxDetune, cents));
        
        const needlePositionPercent = ((clampedDetune + 50) / 100) * 100;
        indicatorEl.style.left = `${needlePositionPercent}%`;

        // ตรรกะสำหรับเอฟเฟกต์ "in-tune" ของกรอบ
        if (Math.abs(cents) < 5) {
            tunerElement.classList.add('in-tune');
        } else {
            tunerElement.classList.remove('in-tune');
        }

        // ✨ [ส่วนที่เพิ่มใหม่] ตรรกะสำหรับเปลี่ยนสีตัวโน้ต ✨
        if (Math.abs(cents) <= 3) {
            noteNameEl.classList.add('note-in-tune');
        } else {
            noteNameEl.classList.remove('note-in-tune');
        }

    } else {
        // กรณีไม่พบเสียง ให้รีเซ็ตทั้งหมด
        tunerElement.classList.remove('in-tune');
        noteNameEl.classList.remove('note-in-tune');
    }
    
    tunerState.animationFrameId = window.requestAnimationFrame(updateTunerDisplay);
};

    // ฟังก์ชัน startTuner และ stopTuner
    const startTuner = async () => {
        if (tunerState.isInitialized) return;
        toggleBtn.setAttribute('aria-busy', 'true');
        refPitchInput.disabled = true; 
        try {
            tunerState.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            tunerState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (tunerState.audioContext.state === 'suspended') {
                await tunerState.audioContext.resume();
            }
            tunerState.analyserNode = tunerState.audioContext.createAnalyser();
            tunerState.analyserNode.fftSize = 2048;
            tunerState.dataArray = new Float32Array(tunerState.analyserNode.fftSize);
            const sourceNode = tunerState.audioContext.createMediaStreamSource(tunerState.stream);
            sourceNode.connect(tunerState.analyserNode);
            tunerState.isInitialized = true;
            updateTunerDisplay();
            toggleBtn.innerHTML = '🟢 กำลังทำงาน';
            toggleBtn.classList.remove('contrast');
            toggleBtn.classList.add('secondary');
        } catch (err) {
            console.error("เกิดข้อผิดพลาดในการตั้งค่าจูนเนอร์:", err);
            stopTuner();
        } finally {
            toggleBtn.removeAttribute('aria-busy');
        }
    };

    const stopTuner = () => {
        if (!tunerState.isInitialized && !tunerState.stream) return;
        refPitchInput.disabled = false;
        if (tunerState.animationFrameId) window.cancelAnimationFrame(tunerState.animationFrameId);
        if (tunerState.stream) tunerState.stream.getTracks().forEach(track => track.stop());
        if (tunerState.audioContext && tunerState.audioContext.state !== 'closed') tunerState.audioContext.close();
        tunerState = {
            audioContext: null, stream: null, analyserNode: null,
            animationFrameId: null, isInitialized: false, dataArray: null
        };
        noteNameEl.textContent = '--';
        freqEl.textContent = `${currentRefPitch.toFixed(1)} Hz`; 
        centEl.textContent = '-';
        indicatorEl.style.transform = 'translateX(0)';
        indicatorEl.style.backgroundColor = 'var(--pico-primary)';
        if(toggleBtn) {
            toggleBtn.innerHTML = '🔴 ปิดอยู่';
            toggleBtn.classList.remove('secondary');
            toggleBtn.classList.add('contrast');
        }
    };
    
    // ✨✨✨ [โค้ดที่แก้ไข] ✨✨✨
    // แก้ไขโดยการผูก Event Listener กับปุ่มโดยตรง ไม่ต้องสร้างปุ่มใหม่
    if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            if (tunerState.isInitialized) {
                stopTuner();
            } else {
                startTuner();
            }
        });
    }
}

// =======================================================================
// ===== ✨ [NEW] ฟังก์ชันสำหรับติดตั้งเมโทรนอม ✨ =====
// =======================================================================
function setupMetronome() {
    const metronome = {
        audioContext: null,
        isPlaying: false,
        nextNoteTime: 0.0,
        currentBeatInBar: 0,
        scheduleAheadTime: 0.1,
        lookahead: 25.0,
        timerID: 0,
        bpm: 120,
        timeSignature: 4,
        subdivision: 1,
        tapTempoTimestamps: [],
    };

    // --- Element References ---
    const bpmSlider = document.getElementById('bpm-slider');
    const bpmDisplay = document.getElementById('bpm-display');
    const timeSignatureSelect = document.getElementById('time-signature-select');
    const subdivisionSelect = document.getElementById('subdivision-select');
    const startStopBtn = document.getElementById('metronome-start-stop-btn');
    const tapTempoBtn = document.getElementById('tap-tempo-btn');
    const visualIndicator = document.getElementById('metronome-visual-indicator');

    // --- Functions ---
    function scheduleNote(beatNumber, time) {
        if (!metronome.audioContext) return;
        const osc = metronome.audioContext.createOscillator();
        const gain = metronome.audioContext.createGain();
        gain.gain.setValueAtTime(1, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
        osc.connect(gain);
        gain.connect(metronome.audioContext.destination);
        osc.frequency.value = (beatNumber % metronome.timeSignature === 0) ? 1200 : 880;
        setTimeout(() => {
            visualIndicator.classList.add(beatNumber % metronome.timeSignature === 0 ? 'beat-1' : 'beat-other');
            setTimeout(() => {
                visualIndicator.classList.remove('beat-1', 'beat-other');
            }, 80);
        }, (time - metronome.audioContext.currentTime) * 1000);
        osc.start(time);
        osc.stop(time + 0.05);
    }

    function scheduler() {
        while (metronome.nextNoteTime < metronome.audioContext.currentTime + metronome.scheduleAheadTime) {
            const secondsPerBeat = 60.0 / metronome.bpm;
            for (let i = 0; i < metronome.subdivision; i++) {
                const time = metronome.nextNoteTime + i * (secondsPerBeat / metronome.subdivision);
                scheduleNote(metronome.currentBeatInBar, time);
            }
            metronome.currentBeatInBar = (metronome.currentBeatInBar + 1) % metronome.timeSignature;
            metronome.nextNoteTime += secondsPerBeat;
        }
        metronome.timerID = window.setTimeout(scheduler, metronome.lookahead);
    }

    function play() {
        if (metronome.isPlaying) return;
        if (metronome.audioContext === null) {
            metronome.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        metronome.isPlaying = true;
        metronome.currentBeatInBar = 0;
        metronome.nextNoteTime = metronome.audioContext.currentTime + 0.1;
        scheduler();
        startStopBtn.textContent = '◼︎ หยุด';
        startStopBtn.classList.remove('contrast');
    }

    function stop() {
        metronome.isPlaying = false;
        window.clearTimeout(metronome.timerID);
        startStopBtn.textContent = '▶︎ เริ่ม';
        startStopBtn.classList.add('contrast');
    }

    function handleTapTempo() {
        const now = performance.now();
        metronome.tapTempoTimestamps.push(now);
        if (metronome.tapTempoTimestamps.length > 1) {
            const intervals = [];
            for (let i = 1; i < metronome.tapTempoTimestamps.length; i++) {
                intervals.push(metronome.tapTempoTimestamps[i] - metronome.tapTempoTimestamps[i-1]);
            }
            const avgInterval = intervals.reduce((sum, val) => sum + val, 0) / intervals.length;
            const newBpm = Math.round(60000 / avgInterval);
            if(newBpm >= 40 && newBpm <= 240) {
                metronome.bpm = newBpm;
                bpmSlider.value = newBpm;
                bpmDisplay.textContent = newBpm;
            }
        }
        setTimeout(() => {
            const lastTap = metronome.tapTempoTimestamps[metronome.tapTempoTimestamps.length - 1];
            if (performance.now() - lastTap > 2000) {
                metronome.tapTempoTimestamps = [];
            }
        }, 2000);
    }

    // --- Event Listeners ---
    bpmSlider.addEventListener('input', (e) => {
        metronome.bpm = parseInt(e.target.value);
        bpmDisplay.textContent = metronome.bpm;
    });
    timeSignatureSelect.addEventListener('input', (e) => {
        metronome.timeSignature = parseInt(e.target.value);
    });
    subdivisionSelect.addEventListener('input', (e) => {
        metronome.subdivision = parseInt(e.target.value);
    });
    startStopBtn.addEventListener('click', () => {
        if (metronome.isPlaying) stop();
        else play();
    });
    tapTempoBtn.addEventListener('click', handleTapTempo);
}

async function main() {
    const urlParamsOnLoad = new URLSearchParams(window.location.search);
    const scannedIdOnLoad = urlParamsOnLoad.get('scan');
    if (scannedIdOnLoad) {
        sessionStorage.setItem('pendingScanId', scannedIdOnLoad);
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    addInitialEventListeners();

    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        await showDashboardView(session.user);
    } else {
        showAuthView();
    }

    supabase.auth.onAuthStateChange(async (_event, session) => {
        if (_event === 'SIGNED_IN' && session) {
            await showDashboardView(session.user);
        } else if (_event === 'SIGNED_OUT') {
            showAuthView();
        }
    });
}

main();
