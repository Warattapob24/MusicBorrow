<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ระบบยืมคืนเครื่องดนตรี</title>
    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@1.5.10/css/pico.min.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://calendar.google.com/calendar/scheduling-button-script.css" rel="stylesheet">
    <script src="https://calendar.google.com/calendar/scheduling-button-script.js" async></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="offline-toast" class="offline-toast">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.707 10.707L12 12m0 0l1.293 1.293M12 12l1.293-1.293M12 12l-1.293 1.293M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.93 7.62a8.96 8.96 0 016.32 1.3M7.05 7.1A8.95 8.95 0 019 6M14.33 3.49A12.98 12.98 0 0012 3.25c-2.4 0-4.66.65-6.6 1.81"/></svg>
        <span>คุณกำลังออฟไลน์ ข้อมูลอาจไม่เป็นปัจจุบัน</span>
    </div>
<div class="theme-switcher-wrapper">
    <button id="theme-cycle-btn" class="theme-switcher" title="สลับธีม">
        <span class="icon sun" aria-hidden="true">☀️</span>
        <span class="icon moon" aria-hidden="true">🌙</span>
        <span class="icon rainbow" aria-hidden="true">🌈</span>
    </button>
</div>

    <main class="container">
        <div id="update-notification" class="hidden" style="position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); z-index: 1000;">
    <button id="update-btn">มีเวอร์ชันใหม่, รีเฟรช</button>
</div>
        <section id="auth-section">
            <article>
                <form id="login-form">
                    <h2>เข้าสู่ระบบ</h2>
                    <input type="email" id="login-email" name="email" placeholder="อีเมล" required autocomplete="email">
                    <input type="password" id="login-password" name="password" placeholder="รหัสผ่าน" required autocomplete="current-password">
                    <button type="submit" id="login-btn">เข้าสู่ระบบ</button>
                    <small><a href="#" id="forgot-password-link">ลืมรหัสผ่าน?</a></small><br>
                    <p><a href="#" id="show-register-link">ยังไม่มีบัญชี? สมัครสมาชิก</a></p><br>
                    <button type="button" id="google-login-btn" class="secondary outline">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 0.5rem;"><g clip-path="url(#clip0_153_103)"><path d="M17.64 9.20455C17.64 8.56682 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5618V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z" fill="#4285F4"></path><path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5618C11.2418 14.0886 10.2109 14.4205 9 14.4205C6.96182 14.4205 5.22091 13.0173 4.50909 11.1764H1.51364V13.5091C3.00273 16.25 5.79545 18 9 18Z" fill="#34A853"></path><path d="M4.50909 11.1764C4.31182 10.6495 4.2 10.0818 4.2 9.5C4.2 8.91818 4.31182 8.35045 4.50909 7.82364V5.49091H1.51364C0.957273 6.61636 0.636364 7.91545 0.636364 9.5C0.636364 11.0845 0.957273 12.3836 1.51364 13.5091L4.50909 11.1764Z" fill="#FBBC05"></path><path d="M9 4.57955C10.2973 4.57955 11.3345 5.03182 12.2455 5.88545L15.0218 3.10909C13.4673 1.62545 11.43 0.636364 9 0.636364C5.79545 0.636364 3.00273 2.75 1.51364 5.49091L4.50909 7.82364C5.22091 5.98273 6.96182 4.57955 9 4.57955Z" fill="#EA4335"></path></g><defs><clipPath id="clip0_153_103"><rect width="18" height="18" fill="white"></rect></clipPath></defs></svg>
    Login with Google
</button>
<hr>
                </form>

                <form id="register-form" class="hidden">
                    <h2>สมัครสมาชิก</h2>
                    <input type="email" name="email" placeholder="อีเมล*" required>
                    <input type="password" name="password" placeholder="รหัสผ่าน (อย่างน้อย 6 ตัวอักษร)*" required minlength="6">
                    <hr>
                    <div class="grid">
    <select name="prefix" required>
        <option value="" disabled selected>-- คำนำหน้า* --</option>
        <option value="เด็กชาย">เด็กชาย</option>
        <option value="เด็กหญิง">เด็กหญิง</option>
        <option value="นาย">นาย</option>
        <option value="นางสาว">นางสาว</option>
        <option value="นาง">นาง</option>
    </select>
                        <input type="text" name="firstname" placeholder="ชื่อ*" required>
                        <input type="text" name="lastname" placeholder="นามสกุล*" required>
                    </div>
                    <div class="grid">
                        <input type="text" name="nickname" placeholder="ชื่อเล่น">
                        <input type="tel" name="phone" placeholder="เบอร์โทรศัพท์">
                        <input type="text" name="lineid" placeholder="Line ID">
                    </div>
                    <div class="grid">
                        <div>
                            <label for="reg-birthdate">วันเกิด*</label>
                            <input type="date" id="reg-birthdate" name="birthdate" required>
                        </div>
                        <div>
                            <label for="reg-age">อายุ (คำนวณอัตโนมัติ)</label>
                            <input type="number" name="age" placeholder="-" readonly>
                        </div>
                    </div>
                    <div>
                        <label for="reg-profileimage">รูปโปรไฟล์</label>
                        <input type="file" id="reg-profileimage" name="profileimage" accept="image/*">
                    </div>
                    <hr>
                    <label for="reg-group">กลุ่มผู้ใช้*</label>
                    <select id="reg-group" name="group" required>
                        <option value="" disabled selected>-- กรุณาเลือกกลุ่ม --</option>
                        <option value="student">นักเรียนทั่วไป</option>
                        <option value="club">สมาชิกชุมนุม</option>
                        <option value="teacher">ครูอาจารย์</option>
                        <option value="guest">บุคคลทั่วไป</option>
                    </select>
                    <div id="student-info-group" class="hidden">
                        <div class="grid">
                            <input type="text" name="studentid" placeholder="รหัสนักเรียน" pattern="[0-9]{5}">
                            <input type="text" name="class_level" pattern="ม\.[1-6]/[1-9][0-9]*" placeholder="ระดับชั้น/ห้องเรียน เช่น ม.4/1">
                        </div>
                    </div>
                    <div id="club-info-group" class="hidden">
                        <input type="text" name="maininstrument" placeholder="เครื่องเอก (สำหรับสมาชิกชุมนุม)">
                    </div>
                    <button type="submit" id="register-btn">ยืนยันการสมัคร</button>
                    <p><a href="#" id="show-login-link">มีบัญชีแล้ว? เข้าสู่ระบบ</a></p>
                </form>
            </article>
        </section>

        <section id="dashboard-section" class="hidden" style="padding: 0; margin: 0;">
            <div id="dashboard-content"></div>
        </section>
    </main>

<script type="module" src="./main.js"></script>
    <div id="oad-qr-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; display:flex; align-items:center; justify-content:center;">
        <article style="background:white; padding:2rem; border-radius:1rem; text-align:center; max-width:90%; color: black;">
            <h4 id="oad-qr-title" style="margin-top:0;">QR Code สำหรับยืม</h4>
            <div id="oad-qr-container" style="display:flex; justify-content:center; margin:1.5rem 0;"></div>
            <button class="oad-btn" onclick="document.getElementById('oad-qr-modal')?.classList.add('hidden')">ปิดหน้าต่าง</button>
        </article>
    </div>
</body>
</html>
