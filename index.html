<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบยืมคืนเครื่องดนตรี</title>
    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@1.5.10/css/pico.min.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://calendar.google.com/calendar/scheduling-button-script.css" rel="stylesheet">
    <script src="https://calendar.google.com/calendar/scheduling-button-script.js" async></script>
    
<style>
/* --- 1. General & Base Styles --- */
body { 
    padding: 1rem; 
}
main { 
    max-width: 640px; 
    margin: auto; 
}
.hidden { 
    display: none !important; 
}
h2 { 
    text-align: center; 
}
article { 
    padding: 1.5rem; 
    margin-bottom: 1rem; 
}
small { 
    display: block; 
    text-align: center; 
    margin-top: 1rem; 
}
label { 
    margin-block-start: 0.5rem; 
}
input[readonly] { 
    background-color: var(--pico-muted-border-color); 
}

/* --- 2. UI Components --- */
.icon-button {
    width: 2.25rem !important;
    height: 2.25rem !important;
    padding: 0.4rem !important; 
    border-radius: 50% !important;
    line-height: 0;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.icon-button svg { 
    width: 1em; 
    height: 1em; 
    display: block; 
}
.badge {
    padding: 0.25em 0.75em; 
    border-radius: var(--pico-border-radius);
    font-size: 0.8em; 
    font-weight: 600; 
    white-space: nowrap;
}
.badge.status-default { background-color: var(--pico-muted-border-color); color: var(--pico-muted-color); }
.badge.status-waiting { background-color: #fef08a; color: #854d0e; } /* Amber */
.badge.status-in-progress { background-color: #bfdbfe; color: #1e40af; } /* Blue */
.badge.status-completed { background-color: #bbf7d0; color: #166534; } /* Green */
.badge.status-rejected { background-color: #fecaca; color: #991b1b; } /* Red */
.badge.status-damaged { background-color: #fed7aa; color: #9a3412; } /* Orange */
.badge.status-cannot-repair { background-color: #e5e7eb; color: #4b5563; } /* Gray */
.badge.status-borrowing { background-color: #a5f3fc; color: #164e63; } /* Cyan */
.badge.status-returned { background-color: #28a745; color: white; }
.badge.status-repairing { background-color: #007bff; color: white; }
.badge.status-borrowed { background-color: #6c757d; color: white; }
.badge.status-overdue { background-color: #f97316; color: #ffffff; } /* Orange */
.badge.status-forced-return { background-color: #4f46e5; color: #ffffff; } /* Indigo */

/* --- 3. Layout & Sections --- */
#user-info-wrapper {
    display: flex; 
    flex-wrap: wrap; 
    align-items: center;
    gap: 0.75rem; 
    margin-bottom: 1rem; 
    font-size: 1.1rem;
}
.top-nav {
    display: flex;
    align-items: center;
    padding: 0.5rem 1rem;
    background-color: var(--pico-card-background-color);
    border-bottom: 1px solid var(--pico-muted-border-color);
    margin-bottom: 1.5rem;
    border-radius: var(--pico-border-radius);
    box-shadow: var(--pico-box-shadow);
}
.top-nav .nav-brand {
    font-weight: bold;
    font-size: 1.2em;
    margin-right: 1.5rem;
}
.top-nav .nav-links {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-right: auto;
}
.top-nav a, .top-nav .dropdown > button {
    padding: 0.5rem 1rem;
    border-radius: var(--pico-border-radius);
    text-decoration: none;
    color: var(--pico-secondary);
    background: none;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: background-color 0.2s, color 0.2s;
}
.top-nav a:hover, .top-nav .dropdown > button:hover {
    background-color: var(--pico-muted-background-color);
    color: var(--pico-contrast);
}
#history-list { 
    max-height: 60vh; 
    overflow-y: auto; 
    padding-right: 1em; 
    margin-right: -1em; 
}
.history-item {
    border: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius);
    margin-bottom: 1rem;
    padding: 1rem;
}
.history-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
}
.history-item-header h5 { margin: 0; }
.history-item-body p {
    margin: 0.25rem 0;
    font-size: 0.9rem;
    color: var(--pico-secondary);
}
.problem-desc { 
    font-style: italic; 
}
#practice-ranking-list table th,
#practice-ranking-list table td {
    padding-top: 0.01rem;    /* ลดระยะห่างด้านบนของแต่ละช่อง */
    padding-bottom: 0.01rem; /* ลดระยะห่างด้านล่างของแต่ละช่อง */
}

/* --- 4. Cards (Instrument & User) --- */
.instrument-card-grid, .user-card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1.5rem;
}
.instrument-card, .user-card {
    border: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius);
    padding: 1rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.instrument-card img {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border-radius: var(--pico-border-radius);
    margin-bottom: 1rem;
}
.user-card img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 1rem;
}
.user-card-actions {
    margin-top: auto;
    padding-top: 1rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
}

/* --- 5. Tables & Admin Specific --- */
.table-container {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}
.table-container table {
    width: 100%;
    min-width: 600px;
}
.instrument-table-img {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: var(--pico-border-radius);
    vertical-align: middle;
}
.admin-tabs {
    display: flex;
    border-bottom: 1px solid var(--pico-muted-border-color);
    margin-bottom: 1.5rem;
    overflow-x: auto;
    background-color: var(--pico-muted-background-color);
    border-radius: var(--pico-border-radius);
    padding: 0.25rem;
}
.admin-tab-btn {
    padding: 0.75rem 1.5rem;
    cursor: pointer;
    border: none;
    background: none;
    border-radius: var(--pico-border-radius);
    color: var(--pico-secondary);
    font-weight: 600;
    white-space: nowrap;
    transition: background-color 0.3s, color 0.3s;
}
.admin-tab-btn:hover {
    background-color: var(--pico-muted-border-color);
}
.admin-tab-btn.active {
    color: var(--pico-primary);
    background-color: var(--pico-card-background-color);
    font-weight: 700;
}
.admin-tab-panel {
    display: none;
    padding-top: 1rem;
}
.admin-tab-panel.active {
    display: block;
}
#admin-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    padding: 0;
}
.stat-card {
    text-align: center;
    padding: 1.25rem 1rem;
    background-color: var(--pico-muted-background-color);
    border-radius: var(--pico-border-radius);
    border: 1px solid var(--pico-muted-border-color);
}
.stat-card h4 {
    font-size: 2.5rem;
    margin-bottom: 0.25rem;
    color: var(--pico-primary);
}
.stat-card p {
    margin: 0;
    font-size: 0.9em;
    color: var(--pico-secondary);
}
.user-rank-highlight {
    background-color: rgba(var(--pico-primary-rgb), 0.15) !important;
    --pico-table-row-striping-background-color: rgba(var(--pico-primary-rgb), 0.15);
}
.user-rank-highlight td {
    color: var(--pico-primary);
    font-weight: bold;
}
/* --- Admin Layout V2 --- */
.admin-container {
    display: flex;
    flex-direction: row;
    gap: 1.5rem;
    align-items: flex-start;
}

.admin-sidebar {
    flex: 0 0 240px; /* กำหนดความกว้างของ Sidebar ที่ 240px */
    position: sticky;
    top: 1.5rem; /* ทำให้ Sidebar ค้างอยู่ด้านบนเมื่อเลื่อนจอ */
}

.admin-sidebar .panel {
    padding: 1rem;
    border-radius: var(--pico-border-radius);
    border: 1px solid var(--pico-muted-border-color);
    background-color: var(--pico-card-background-color);
}

.admin-sidebar h5 {
    margin-top: 0;
    border-bottom: 1px solid var(--pico-muted-border-color);
    padding-bottom: 0.75rem;
    margin-bottom: 1rem;
}

.admin-sidebar .menu-list button {
    display: flex; /* เปลี่ยนเป็น flex เพื่อจัดไอคอนกับข้อความ */
    align-items: center;
    gap: 0.75rem; /* ระยะห่างระหว่างไอคอนกับข้อความ */
    width: 100%;
    text-align: left;
    margin-bottom: 0.5rem;
    padding: 0.75rem 1rem;
    border: none;
    background: none;
    border-radius: var(--pico-border-radius);
    cursor: pointer;
    font-weight: 500;
    color: var(--pico-secondary); /* ✨ เพิ่มบรรทัดนี้! เพื่อกำหนดสีเริ่มต้น */
    transition: all 0.2s ease-in-out; /* ทำให้สวยงามขึ้น */
}

.admin-sidebar .menu-list button:hover {
    background-color: var(--pico-muted-background-color);
    color: var(--pico-contrast); /* ✨ เพิ่มบรรทัดนี้! */
}

.admin-sidebar .menu-list button.active {
    background-color: var(--pico-primary-background);
    color: var(--pico-primary-hover);
    font-weight: bold;
}

.admin-content {
    flex-grow: 1; /* ให้ส่วนเนื้อหายืดเต็มพื้นที่ที่เหลือ */
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 1.5rem;
}

/* ทำให้ Panel ต่างๆ จัดวางใน Grid ได้ */
.admin-content > .panel {
    background-color: var(--pico-card-background-color);
    border: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius);
    padding: 1.5rem;
}

.panel.full-width { grid-column: 1 / -1; }
.panel.col-span-8 { grid-column: span 8; }
.panel.col-span-4 { grid-column: span 4; }
.panel.col-span-6 { grid-column: span 6; }

@media (max-width: 992px) {
    .admin-container { flex-direction: column; }
    .admin-sidebar { width: 100%; position: static; }
    .panel.col-span-8, .panel.col-span-4 { grid-column: 1 / -1; }
}

@media (max-width: 768px) {
    .panel.col-span-6 { grid-column: 1 / -1; }
}

.admin-sidebar.collapsed {
    flex: 0 0 72px; /* ความกว้างตอนพับ */
}

.admin-sidebar.collapsed .menu-list button span {
    display: none; /* ซ่อนข้อความ */
}

.admin-sidebar.collapsed h5,
.admin-sidebar.collapsed #sidebar-toggle-btn .label {
    display: none; /* ซ่อนหัวข้อและข้อความปุ่มพับ */
}

.admin-sidebar.collapsed #sidebar-toggle-btn .icon-collapse {
    transform: rotate(180deg); /* หมุนไอคอนลูกศรกลับ */
}

/* --- 6. Interactive Elements --- */
.theme-switcher-wrapper {
    position: absolute;
    top: 1rem;
    right: 1rem;
    z-index: 1000;
}
.theme-switcher {
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0.5rem;
    border-radius: 50%;
    transition: background-color 0.2s;
}
.theme-switcher:hover {
    background-color: var(--pico-muted-background-color);
}
.theme-switcher .icon {
    font-size: 1.5rem;
    line-height: 1;
    display: none;
}
.dropdown {
    position: relative;
    display: inline-block;
}
.dropdown-content {
    display: none;
    position: absolute;
    background-color: var(--pico-card-background-color);
    min-width: 220px;
    box-shadow: var(--pico-box-shadow);
    border-radius: var(--pico-border-radius);
    border: 1px solid var(--pico-muted-border-color);
    padding: 0.5rem;
    z-index: 100;
    margin-top: 0.5rem;
}
.dropdown-content a, .dropdown-content button {
    color: var(--pico-color);
    padding: 0.75rem 1rem;
    text-decoration: none;
    display: block;
    text-align: left;
    border-radius: var(--pico-border-radius);
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
}
.dropdown-content a:hover, .dropdown-content button:hover {
    background-color: var(--pico-primary-background);
    color: var(--pico-primary-hover);
}
.dropdown.show .dropdown-content {
    display: block;
}
.view-switcher {
    display: inline-flex;
    border: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius);
    margin-left: auto;
}
.view-switcher button {
    border: none;
    background-color: transparent;
    padding: 0.5rem 0.75rem;
    cursor: pointer;
    line-height: 1;
    color: var(--pico-secondary);
}
.view-switcher button.active {
    background-color: var(--pico-primary);
    color: var(--pico-primary-inverse);
}
.view-switcher button:first-of-type {
    border-top-left-radius: var(--pico-border-radius);
    border-bottom-left-radius: var(--pico-border-radius);
}
.view-switcher button:last-of-type {
    border-top-right-radius: var(--pico-border-radius);
    border-bottom-right-radius: var(--pico-border-radius);
}
.view-switcher svg {
    width: 1.25em;
    height: 1.25em;
    display: block;
}
.modal-header-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
}
.modal-filter-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1rem;
}
.modal-filter-grid > input[type="search"] {
    flex: 2 1 250px;
    max-width: 450px;
}
.modal-filter-grid > select {
    flex: 1 1 200px;
    max-width: 300px;
}
/* ใน <style> ของคุณ */

/* --- Modal V2 Styles --- */
.modal-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    padding: 1rem;
    background-color: var(--pico-muted-background-color);
    border-radius: var(--pico-border-radius);
    margin-bottom: 1.5rem;
}

.modal-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.5rem;
}

.modal-filters > input[type="search"] {
    flex: 2 1 200px;
}
.modal-filters > select {
    flex: 1 1 150px;
}
.modal-view.hidden {
    display: none;
}

/* --- 7. Specific Tools --- */
/* --- Native Tuner Styles --- */
#native-tuner {
    background-color: var(--pico-muted-background-color);
    border: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius);
    padding: 1.5rem;
    padding-bottom: 2.5rem;
    text-align: center;
    font-family: monospace;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
}
#native-tuner.in-tune {
    border-color: var(--pico-color-green-400);
    box-shadow: 0 0 12px var(--pico-color-green-400);
}
.tuner-note-name {
    font-size: 4rem;
    font-weight: bold;
    line-height: 1;
}
.tuner-details {
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: var(--pico-secondary);
}
.tuner-meter {
    height: 30px;
    background-color: var(--pico-form-element-background-color);
    border-radius: var(--pico-border-radius);
    position: relative;
    overflow: visible;
    border: 1px solid var(--pico-muted-border-color);
    margin-top: 1rem;
    background-image: 
        linear-gradient(to right, transparent 49.8%, var(--pico-secondary) 49.8%, var(--pico-secondary) 50.2%, transparent 50.2%),
        linear-gradient(to right, 
            transparent 24.9%, var(--pico-muted-border-color) 24.9%, var(--pico-muted-border-color) 25.1%, transparent 25.1%,
            transparent 74.9%, var(--pico-muted-border-color) 74.9%, var(--pico-muted-border-color) 75.1%, transparent 75.1%
        );
    background-size: 100% 100%;
    background-repeat: no-repeat;
}
.tuner-indicator {
    position: absolute;
    top: 0;
    left: 50%; /* เริ่มต้นที่กลาง */
    width: 3px;
    height: 100%;
    background-color: var(--pico-primary);
    /* transform สำคัญมากสำหรับจัดให้เข็มอยู่ตรงกลางตำแหน่งของมัน */
    transform: translateX(-50%); 
    transition: left 0.1s linear, background-color 0.1s; /* เปลี่ยนมาควบคุม left แทน transform */
    border-radius: 2px;
}
/* --- สีสำหรับตัวโน้ตเมื่อเสียงตรง --- */
.tuner-note-name.note-in-tune {
    color: var(--pico-color-green-500);
    transition: color 0.1s;
}
#native-tuner.in-tune .tuner-indicator {
    background-color: var(--pico-color-green-500) !important;
}
.tuner-mark {
    position: absolute;
    bottom: -22px;
    transform: translateX(-50%);
    font-size: 0.8rem;
    color: var(--pico-secondary);
}
/* --- Metronome Styles --- */
.metronome-indicator-light {
    width: 20px;
    height: 20px;
    background-color: var(--pico-muted-background-color);
    border: 2px solid var(--pico-muted-border-color);
    border-radius: 50%;
    margin: 1rem auto;
    transition: background-color 0.05s, transform 0.05s;
}
.metronome-indicator-light.beat-1 {
    background-color: var(--pico-color-azure-400);
    transform: scale(1.2);
}
.metronome-indicator-light.beat-other {
    background-color: var(--pico-color-gray-400);
    transform: scale(1.1);
}
/* --- Iframe Styles --- */
.iframe-container {
    position: relative;
    overflow: hidden;
    width: 100%;
    padding-top: 125%;
    border: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius);
    background-color: var(--pico-card-background-color);
}
.iframe-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    width: 100%;
    height: 100%;
    border: 0;
}

/* --- 8. Theme Definitions --- */
/* --- Light/Dark Theme Switcher Icons --- */
[data-theme="light"] .theme-switcher .sun { display: block; }
[data-theme="dark"] .theme-switcher .moon { display: block; }
[data-theme="rainbow"] .theme-switcher .rainbow { display: block; }

/* --- Dark Mode SweetAlert Fix --- */
html[data-theme="dark"] .swal2-popup { 
    background: hsl(210, 15%, 15%) !important; 
}
html[data-theme="dark"] .swal2-input,
html[data-theme="dark"] .swal2-select,
html[data-theme="dark"] .swal2-textarea {
    background-color: hsl(210, 15%, 25%) !important;
    color: var(--pico-color) !important;
    border: 1px solid var(--pico-form-element-border-color) !important;
}
html[data-theme="dark"] .swal2-title,
html[data-theme="dark"] .swal2-html-container,
html[data-theme="dark"] .swal2-html-container label { 
    color: var(--pico-color) !important; 
}

/* --- Rainbow Theme --- */
@keyframes rainbow-bg {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}
[data-theme="rainbow"] {
    --pico-background-color: #f3f4f6;
    --pico-color: #111827;
    --pico-card-background-color: rgba(255, 255, 255, 0.85);
    --pico-card-border-color: rgba(209, 213, 219, 0.5);
    --pico-form-element-background-color: rgba(255, 255, 255, 0.9);
    --pico-primary: #4f46e5;
    --pico-primary-hover: #3730a3;
    --pico-primary-focus: rgba(79, 70, 229, 0.25);
    --pico-primary-inverse: #ffffff;
}
[data-theme="rainbow"] body {
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: rainbow-bg 15s ease infinite;
    color: var(--pico-color);
}
html[data-theme="rainbow"] .swal2-popup {
    background: var(--pico-card-background-color) !important;
    backdrop-filter: blur(5px);
}
html[data-theme="rainbow"] .swal2-title,
html[data-theme="rainbow"] .swal2-html-container {
    color: var(--pico-color) !important;
}
/* Rainbow Theme Card Colors */
[data-theme="rainbow"] #dashboard-content > article:nth-of-type(4n + 1) {

function escapeHtml(text) {
    if (text === null || typeof text === 'undefined') return '';
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return String(text).replace(/[&<>"']/g, (m) => map[m]);
}

function parseMediaUrl(url) {
    if (!url) return null;
    
    // YouTube Video Patterns (ทำงานปกติ)
    const videoPatterns = [
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
        /(?:https?:\/\/)?youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/
    ];
    for (const pattern of videoPatterns) {
        const match = url.match(pattern);
        if (match && match[1]) {
            return {
                type: 'video',
                thumbnailUrl: `https://i.ytimg.com/vi/${match[1]}/mqdefault.jpg`,
                originalUrl: url
            };
        }
    }

    // YouTube Playlist Pattern (ทำงานปกติ)
    const playlistPattern = /(?:https?:\/\/)?(?:www\.)?youtube\.com\/playlist\?list=([a-zA-Z0-9_-]+)/;

            originalUrl: url

function getHistoryStatus(log) {
    // ✨✨✨ เพิ่มเงื่อนไขนี้เข้าไปเป็นอันดับแรกสุด ✨✨✨
    // เช็คก่อนเลยว่ารายการนี้ถูกแอดมินบังคับคืนหรือไม่
    if (log.is_force_returned) {
        return { text: 'บังคับคืน', badgeClass: 'status-rejected' }; // ใช้ badge สีแดง
    }
    // ✨✨✨ จบส่วนที่เพิ่มเข้ามา ✨✨✨

    // ลำดับความสำคัญที่ 1: ถ้ามีสถานะการซ่อมล่าสุด ให้แสดงสถานะนั้นก่อนเสมอ
    if (log.latest_repair_status) {
        switch (log.latest_repair_status) {
            case 'แจ้งซ่อม':
                return { text: 'แจ้งซ่อม', badgeClass: 'status-waiting' };
            case 'กำลังซ่อม':
                return { text: 'กำลังซ่อม', badgeClass: 'status-repairing' };
            case 'ซ่อมเสร็จสิ้น':
                return { text: 'ซ่อมเสร็จ', badgeClass: 'status-completed' };
            case 'ไม่สามารถซ่อมได้':
                return { text: 'ซ่อมไม่ได้', badgeClass: 'status-cannot-repair' };
            default:
                return { text: log.latest_repair_status, badgeClass: 'status-default' };
        }
    }
    
    // ลำดับความสำคัญที่ 2: ถ้ามีการแจ้งปัญหา แต่ยังไม่มีสถานะซ่อม (เป็นกรณีสำรอง)
    if (log.problem_description) {
        return { text: 'แจ้งซ่อมแล้ว', badgeClass: 'status-damaged' };
    }

    // ลำดับความสำคัญที่ 3: สถานะการยืม-คืนปกติ
    if (!log.return_timestamp) {
        if (log.is_take_home) {
            if (log.approval_status === 'pending') return { text: 'รออนุมัติ', badgeClass: 'status-waiting' };
            if (log.approval_status === 'approved') return { text: 'อนุมัติ (ยังไม่คืน)', badgeClass: 'status-borrowing' };
            if (log.approval_status === 'rejected') return { text: 'ถูกปฏิเสธ', badgeClass: 'status-rejected' };
        }
        return { text: 'ยังไม่คืน', badgeClass: 'status-borrowing' };
    }

    // สถานะเริ่มต้น: คืนแล้วปกติ
    return { text: 'คืนแล้ว', badgeClass: 'status-completed' };
}

function getRawHistoryStatus(log) {
    if (log.problem_description) return 'repair';
    if (!log.return_timestamp) {
        if (log.is_take_home) {
            if (log.approval_status === 'pending') return 'take_home_pending';
            if (log.approval_status === 'approved') return 'borrowed';
            if (log.approval_status === 'rejected') return 'take_home_rejected';
        }
        return 'borrowed';
    }
    return 'returned';
}

function filterUserTable() {
    const scope = document.querySelector('.swal2-popup') || document;
    if (!scope) return;

    // 1. ดึงค่าจากฟิลเตอร์ทั้งหมด (รวมฟิลเตอร์ใหม่)
    const searchTerm = (scope.querySelector('#user-search-input-modal'))?.value.toLowerCase() || '';
    const selectedGroup = (scope.querySelector('#user-group-filter-modal'))?.value || 'all';
    const selectedClass = (scope.querySelector('#user-class-filter-modal'))?.value || 'all'; // ✨ เพิ่มมาใหม่
    
    const userElements = scope.querySelectorAll('.user-card, #modal-user-list-container tbody tr');

    userElements.forEach(el => {
        const text = el.textContent.toLowerCase();
        const group = el.dataset.group;
        const classLevel = el.dataset.classLevel; // ✨ เพิ่มมาใหม่

        const matchesSearch = text.includes(searchTerm);
        const matchesGroup = (selectedGroup === 'all' || group === selectedGroup);
        const matchesClass = (selectedClass === 'all' || classLevel === selectedClass); // ✨ เพิ่มเงื่อนไขใหม่

        // el.style.display ใช้ได้ทั้งกับการ์ด (display: flex) และแถว (display: table-row)
        el.style.display = (matchesSearch && matchesGroup && matchesClass) ? '' : 'none';
    });
}

// เพิ่มฟังก์ชันนี้เข้าไป
function addSafeEventListener(elementOrSelector, eventType, callback) {
    // ตรวจสอบว่าสิ่งที่ส่งมาเป็น ID หรือ Element โดยตรง
    const element = typeof elementOrSelector === 'string' 
        ? document.querySelector(elementOrSelector) 
        : elementOrSelector;

    if (element) {
        // ถ้าหาเจอ ก็ผูกเวทมนตร์ดักฟังตามปกติ
        element.addEventListener(eventType, callback);
    } else {
        // แต่ถ้าหาไม่เจอ! ให้แสดงคำเตือนใน Console เพื่อให้เรารู้ว่าจุดไหนคือตัวปัญหา
        console.error(`คำเตือนจากแม่มด: หา Element ไม่เจอสำหรับ Selector: '${elementOrSelector}'`);
    }
}

function formatMinutesToHoursMinutes(totalMinutes) {
    if (isNaN(totalMinutes) || totalMinutes < 0) {
        return '00:00';
    }
    const hours = Math.floor(totalMinutes / 60);
    const minutes = Math.round(totalMinutes % 60);
    
    const formattedHours = String(hours).padStart(2, '0');
    const formattedMinutes = String(minutes).padStart(2, '0');
    
    return `${formattedHours}:${formattedMinutes}`;
}

function lazyLoadSection(sectionSelector, loadingFunction) {
    const section = document.querySelector(sectionSelector);
    if (!section) {
        console.warn(`Lazy load section not found: ${sectionSelector}`);
        return;
    }

    const observer = new IntersectionObserver((entries, observerInstance) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                loadingFunction(); // เมื่อเจอส่วนที่กำหนด ให้ร่ายคาถาโหลดข้อมูล
                observerInstance.unobserve(entry.target); // แล้วหยุดส่อง เพื่อไม่ให้ทำงานซ้ำ
            }
        });
    }, { rootMargin: '0px 0px 200px 0px' }); // เริ่มโหลดก่อนจะถึงขอบจอ 200px

    observer.observe(section);
}

function checkBorrowingStatusAndNotify() {
    if (!currentUser || !myBorrowedItems || myBorrowedItems.length === 0) {
        return; // ไม่ต้องทำอะไรถ้ายังไม่ได้ล็อกอินหรือไม่ได้ยืมของ
    }

    const now = new Date();

    myBorrowedItems.forEach(item => {
        const borrowTime = new Date(item.borrow_timestamp);
        const minutesElapsed = (now - borrowTime) / (1000 * 60);

        // ตรรกะสำหรับ "สมาชิกชุมนุม"
        if (currentUser.student_group === 'club') {
            if (!item.is_take_home) {
                if (minutesElapsed >= 180 && !sessionStorage.getItem(`notified_club_3h_${item.id}`)) {
                    showAndSaveNotification('🔔 แจ้งเตือนเวลาซ้อม', { body: `คุณซ้อมมาแล้ว 3 ชั่วโมงสำหรับ '${item.instrument_name}'` });
                    sessionStorage.setItem(`notified_club_3h_${item.id}`, 'true');
                }
                if (minutesElapsed >= 300 && !sessionStorage.getItem(`notified_club_5h_${item.id}`)) {
                    showAndSaveNotification('🔔 แจ้งเตือนเวลาซ้อม', { body: `คุณซ้อมมาแล้ว 5 ชั่วโมงสำหรับ '${item.instrument_name}'` });
                    sessionStorage.setItem(`notified_club_5h_${item.id}`, 'true');
                }
                if (minutesElapsed >= 350 && !sessionStorage.getItem(`notified_club_warn_${item.id}`)) {
                    showAndSaveNotification('⏰ ใกล้หมดเวลา!', { body: `เหลือเวลาอีก 10 นาทีสำหรับ '${item.instrument_name}'` });
                    sessionStorage.setItem(`notified_club_warn_${item.id}`, 'true');
                }
                if (minutesElapsed >= 360 && !sessionStorage.getItem(`notified_club_overdue_${item.id}`)) {
                    showAndSaveNotification('🚫 หมดเวลาแล้ว!', { body: `กรุณานำ '${item.instrument_name}' ไปคืนโดยด่วน` });
                    sessionStorage.setItem(`notified_club_overdue_${item.id}`, 'true');
                }
            }
        } 
        // ตรรกะสำหรับ "นักเรียนทั่วไป"
        else if (currentUser.student_group === 'student') {
            if (!item.is_take_home) {
                if (minutesElapsed >= 50 && !sessionStorage.getItem(`notified_student_warn_${item.id}`)) {
                    showAndSaveNotification('⏰ ใกล้หมดเวลา!', { body: `เหลือเวลาอีก 10 นาทีสำหรับ '${item.instrument_name}'` });
                    sessionStorage.setItem(`notified_student_warn_${item.id}`, 'true');
                }
                if (minutesElapsed >= 60 && !sessionStorage.getItem(`notified_student_overdue_${item.id}`)) {
                    showAndSaveNotification('🚫 หมดเวลาแล้ว!', { body: `กรุณานำ '${item.instrument_name}' ไปคืนโดยด่วน` });
                    sessionStorage.setItem(`notified_student_overdue_${item.id}`, 'true');
                }
            }
        }

        // ตรรกะสำหรับการยืมกลับบ้าน (ใช้ร่วมกันสำหรับ club, teacher, guest)
        if (item.is_take_home && item.due_date) {
            const dueDate = new Date(item.due_date);
            const hoursUntilDue = (dueDate - now) / (1000 * 60 * 60);

            if (hoursUntilDue > 0 && hoursUntilDue <= 24 && !sessionStorage.getItem(`notified_due_warn_${item.id}`)) {
                showAndSaveNotification('🗓️ ใกล้ถึงกำหนดคืน!', { body: `คุณต้องคืน '${item.instrument_name}' ภายในวันพรุ่งนี้` });
                sessionStorage.setItem(`notified_due_warn_${item.id}`, 'true');
            }
            else if (hoursUntilDue <= 0 && !sessionStorage.getItem(`notified_due_overdue_${item.id}`)) {
                showAndSaveNotification('‼️ ถึงกำหนดคืนแล้ว!', { body: `กรุณานำ '${item.instrument_name}' มาคืนที่ห้องชุมนุม` });
                sessionStorage.setItem(`notified_due_overdue_${item.id}`, 'true');
            }
        }
    });
}

/**
 * ฟังก์ชันสำหรับแสดงและบันทึกการแจ้งเตือน
 */
async function showAndSaveNotification(title, options) {
    // 1. บันทึกการแจ้งเตือนลงฐานข้อมูล
    try {
        const { error } = await supabase.from('notifications').insert({
            user_id: currentUser.id,
            title: title,
            body: options.body || ''
        });
        if (error) throw error;
        playNotificationSound(); // เล่นเสียงเมื่อบันทึกสำเร็จ
    } catch (err) {
        console.error("Error saving notification to DB:", err);
    }

    // 2. แสดงการแจ้งเตือนของเบราว์เซอร์ (ถ้าได้รับอนุญาต)
    if ('Notification' in window && Notification.permission === 'granted') {
        try {
            const registration = await navigator.serviceWorker.ready;
            await registration.showNotification(title, {
                body: options.body || '',
                icon: 'https://www.gstatic.com/images/icons/material/system/2x/music_note_gm_blue_24dp.png',
                tag: options.tag || 'default-tag',
            });
        } catch (err) {
            console.error("Error showing native notification:", err);
        }
    }
}

/**
 * ฟังก์ชันสำหรับตรวจสอบการแจ้งเตือนที่ยังไม่ได้อ่าน
 */
async function checkForUnreadNotifications() {
    const notificationBell = document.getElementById('notification-bell');
    if (!notificationBell) return;

    try {
        const { data, error, count } = await supabase
            .from('notifications')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', currentUser.id)
            .eq('is_read', false);

        if (error) throw error;

        const unreadIndicator = notificationBell.querySelector('.unread-indicator');
        if (unreadIndicator) {
            unreadIndicator.classList.toggle('hidden', count === 0);
        }
    } catch (err) {
        console.error("Error checking for unread notifications:", err);
    }
}

/**
 * ฟังก์ชันสำหรับแสดงศูนย์การแจ้งเตือน
 */
async function renderNotificationCenter() {
    Swal.fire({
        title: 'ศูนย์การแจ้งเตือน',
        html: `<div id="notification-list-container" aria-busy="true" style="min-height: 300px;"></div>`,
        width: '90%',
        maxWidth: '600px',
        showCloseButton: true,
        showConfirmButton: false,
        didOpen: async () => {
            const container = document.getElementById('notification-list-container');
            try {
                const { data: notifications, error } = await supabase
                    .from('notifications')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false })
                    .limit(20);

                if (error) throw error;

                if (!notifications || notifications.length === 0) {
                    container.innerHTML = '<p style="text-align: center; padding: 2rem;">ยังไม่มีการแจ้งเตือน</p>';
                    return;
                }

                const notificationHtml = notifications.map(n => `
                    <div class="notification-item ${n.is_read ? 'read' : 'unread'}" data-id="${n.id}" style="padding: 1rem; border-bottom: 1px solid var(--pico-muted-border-color); cursor: pointer; opacity: ${n.is_read ? 0.6 : 1};">
                        <p style="font-weight: bold; margin: 0;">${escapeHtml(n.title)}</p>
                        <p style="margin: 0.25rem 0;">${escapeHtml(n.body)}</p>
                        <small style="text-align: left; margin: 0.5rem 0 0 0;">${timeAgo(n.created_at)}</small>
                    </div>
                `).join('');
                
                container.innerHTML = `<div style="max-height: 60vh; overflow-y: auto;">${notificationHtml}</div>`;
                
                const unreadIds = notifications.filter(n => !n.is_read).map(n => n.id);
                if (unreadIds.length > 0) {
                    await supabase.from('notifications').update({ is_read: true }).in('id', unreadIds);
                    checkForUnreadNotifications();
                }

            } catch (err) {
                container.innerHTML = `<p style="color: red;">ไม่สามารถโหลดการแจ้งเตือนได้: ${err.message}</p>`;
            } finally {
                container.removeAttribute('aria-busy');
            }
        }
    });
}

// ฟังก์ชันสำหรับสร้างเสียงแจ้งเตือน
function playNotificationSound(type = 'default') {
    // ตรวจสอบว่าผู้ใช้เปิดลำโพงหรือไม่ (ป้องกัน error ในบาง browser)
    if (typeof AudioContext === "undefined" && typeof webkitAudioContext === "undefined") return;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);

    switch (type) {
        case 'success':
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
            break;
        case 'warning':
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
            break;
        case 'error':
            oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
            break;
        default:
            oscillator.frequency.setValueAtTime(520, audioCtx.currentTime);
            break;
    }

    oscillator.start(audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
    oscillator.stop(audioCtx.currentTime + 0.3);
}

// ฟังก์ชันสำหรับแสดงการแจ้งเตือนของระบบ
// ใน <script type="module"> ของ index.html
// ค้นหาฟังก์ชัน showNativeNotification แล้วแทนที่ด้วยเวอร์ชันนี้

async function showNativeNotification(title, options) {
    if (!('Notification' in window)) {
        console.warn('เบราว์เซอร์นี้ไม่รองรับ Notification API');
        return;
    }

    let permission = await Notification.requestPermission();
    if (permission !== 'granted') {
        console.log('ผู้ใช้ไม่อนุญาตให้แสดงการแจ้งเตือน');
        return;
    }

    try {
        const registration = await navigator.serviceWorker.ready;
        // ✨ ลองใช้ Service Worker ก่อน (วิธีที่ดีที่สุด)
        await registration.showNotification(title, {
            body: options.body || '',
            icon: options.icon || 'assets/logo.png',
            tag: options.tag || 'default-tag',
            data: {
                url: window.location.href
            }
        });
        playNotificationSound('default'); // เล่นเสียงเมื่อสำเร็จ
    } catch (err) {
        // ✨ หาก Service Worker ล้มเหลว (ทางหนีทีไล่)
        console.warn('Service Worker notification failed, falling back to basic notification.', err);
        try {
            // ลองสร้าง Notification แบบพื้นฐานแทน
            const notification = new Notification(title, {
                body: options.body || '',
                icon: options.icon || 'assets/logo.png',
                tag: options.tag || 'default-tag'
            });
            playNotificationSound('default');
        } catch (fallbackErr) {
            console.error('Fallback notification also failed:', fallbackErr);
        }
    }
}

// ฟังก์ชันสำหรับแปลงเวลาที่ผ่านไปให้เป็นรูปแบบ HH:MM:SS (ฉบับสมบูรณ์)
function formatElapsedTime(startTime) {
    // 1. ตรวจสอบค่าเริ่มต้น
    if (!startTime || typeof startTime !== 'string') {
        console.error("Invalid or missing startTime:", startTime);
        return '00:00:00';
    }

    let parsableTime = startTime;

    // 2. แปลง timestamp string ที่อาจมี space ให้เป็น ISO format ที่ถูกต้อง (T separator)
    parsableTime = parsableTime.replace(' ', 'T');

    // 3. จัดการความละเอียดของเวลาที่เกินมา (ตัดไมโครวินาทีให้เหลือมิลลิวินาที)
    // เช่น "....123456" จะถูกแปลงให้เป็น "....123"
    const microsecondMatch = parsableTime.match(/\.(\d+)/);
    if (microsecondMatch && microsecondMatch[1].length > 3) {
        const ms = microsecondMatch[1].substring(0, 3);
        parsableTime = parsableTime.replace(/\.\d+/, `.${ms}`);
    }

    // ✨ 4. ตรวจสอบและจัดการ Timezone อย่างแม่นยำ (ส่วนที่แก้ไขสำคัญที่สุด) ✨
    // สร้าง Regular Expression เพื่อตรวจสอบว่ามีข้อมูล Timezone (Z หรือ +HH:MM หรือ -HH:MM) แล้วหรือยัง
    const timezoneRegex = /Z|([+-]\d{2}:\d{2})$/;
    if (!timezoneRegex.test(parsableTime)) {
        // หากยังไม่มี ให้เติม 'Z' เพื่อระบุว่าเป็นเวลา UTC
        parsableTime += 'Z';
    }

    // 5. แปลงเป็นเวลาในรูปแบบที่คำนวณได้
    const start = new Date(parsableTime).getTime();
    
    if (isNaN(start)) {
        console.error("Final parsing failed. Invalid startTime:", parsableTime, "(Original: ", startTime, ")");
        return '00:00:00';
    }

    const now = new Date().getTime();
    const difference = now - start;

    if (difference < 0) return '00:00:00';

    // 6. คำนวณชั่วโมง, นาที, และวินาที
    const hours = Math.floor(difference / (1000 * 60 * 60));
    const minutes = Math.floor((difference / (1000 * 60)) % 60);
    const seconds = Math.floor((difference / 1000) % 60);

    // เพิ่มเลข 0 ข้างหน้าหากน้อยกว่า 10
    const paddedHours = String(hours).padStart(2, '0');
    const paddedMinutes = String(minutes).padStart(2, '0');
    const paddedSeconds = String(seconds).padStart(2, '0');

    return `${paddedHours}:${paddedMinutes}:${paddedSeconds}`;
}

/**
 * แปลงวันที่ให้เป็นข้อความ "เมื่อ ... ที่แล้ว"
 * @param {Date | string} date - วันที่ที่ต้องการเปรียบเทียบ
 * @returns {string} ข้อความที่จัดรูปแบบแล้ว
 */
function timeAgo(date) {
    if (!date) return '';
    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
    if (seconds < 5) return "เมื่อสักครู่";
    let interval = seconds / 31536000;
    if (interval > 1) return Math.floor(interval) + " ปีที่แล้ว";
    interval = seconds / 2592000;
    if (interval > 1) return Math.floor(interval) + " เดือนที่แล้ว";
    interval = seconds / 86400;
    if (interval > 1) return Math.floor(interval) + " วันที่แล้ว";
    interval = seconds / 3600;
    if (interval > 1) return Math.floor(interval) + " ชั่วโมงที่แล้ว";
    interval = seconds / 60;
    if (interval > 1) return Math.floor(interval) + " นาทีที่แล้ว";
    return Math.floor(seconds) + " วินาทีที่แล้ว";
}

 function launchGame(gameFileName, userData) {
    // สร้าง iframe ขึ้นมาแบบไดนามิก
    const gameIframe = document.createElement('iframe');
    gameIframe.id = 'game-iframe';
    gameIframe.src = gameFileName; // ชี้ไปยังไฟล์เกมของคุณ
    gameIframe.style.position = 'fixed';
    gameIframe.style.top = '0';
    gameIframe.style.left = '0';
    gameIframe.style.width = '100%';
    gameIframe.style.height = '100%';
    gameIframe.style.border = 'none';
    gameIframe.style.zIndex = '9999';

    // ส่งข้อมูลผู้ใช้ไปยังเกมหลังจากที่ iframe โหลดเสร็จ
    gameIframe.onload = () => {
        gameIframe.contentWindow.postMessage({
            type: 'INIT_GAME',
            user: userData
        }, '*');
    };

    document.body.appendChild(gameIframe);
}

function closeGame() {
    const gameIframe = document.getElementById('game-iframe');
    if (gameIframe) {
        gameIframe.remove();
        // อาจจะต้องรีเฟรชข้อมูลบางส่วนในหน้าหลักหลังจากปิดเกม
        refreshOnReturn();
    }
}

        if (payload && typeof payload.duration === 'number' && typeof payload.score === 'number') {
            try {

                const { error: gameSessionError } = await supabase.from('game_sessions').insert({
                    user_id: currentUser.id,

                    start_time: new Date(Date.now() - payload.duration * 60000).toISOString(),
                    end_time: new Date().toISOString(),
                    duration_minutes: Math.round(payload.duration),
                    score: payload.score
                });
                if (gameSessionError) throw gameSessionError;

                // 2. บันทึกเวลาลง practice_sessions
                if (payload.duration > 0) {
                    const { error: practiceSessionError } = await supabase.from('practice_sessions').insert({

                    });

                // (เราจะเรียกใช้ check_and_award_new_badges ที่รองรับทั้งการยืมและเกม)
                const { data: newBadges, error: badgeError } = await supabase.rpc('check_and_award_new_badges', {
                    p_user_id: currentUser.id
                    // ไม่ต้องส่ง p_log_id เพราะเป็นการเช็คจากเกม
                });

                // (Logic แสดง popup เหรียญตราใหม่ ถ้ามี)
                if (newBadges && newBadges.length > 0) {
                    for (const badge of newBadges) {
                        Swal.fire({
                            toast: true,
                            position: 'top-end',
                            icon: 'success',
                            title: 'ได้รับเหรียญตราใหม่!',
                            html: `<b>${escapeHtml(badge.badge_name)}</b>`,
                            showConfirmButton: false,
                            timer: 4000
                        });
                    }
                    renderMyBadges(currentUser.id);
                }

            } catch (error) {
                console.error('Failed to save game session or award badges:', error.message);
                Swal.fire('ผิดพลาด', 'ไม่สามารถบันทึกผลการเล่นเกมได้', 'error');
            }
        }
    } else if (event.data.type === 'CLOSE_GAME') {
        closeGame();
    }
});

function populateInstrumentSelect() {
    const container = document.getElementById('borrow-form-container');
    const typeFilter = container?.querySelector('#type-filter');
    const instrumentSelect = container?.querySelector('#instrument-select');
    const agreementSwitch = container?.querySelector('#agreement-switch');
    if (!container || !typeFilter || !instrumentSelect || !agreementSwitch) return;
    const selectedType = typeFilter.value;
    const filtered = (selectedType === 'all') ? availableInstruments : availableInstruments.filter(i => i.type === selectedType);
    instrumentSelect.innerHTML = '<option value="">-- กรุณาเลือก --</option>';
    if (filtered.length > 0) {
        filtered.forEach(i => instrumentSelect.innerHTML += `<option value="${i.id}">${escapeHtml(i.name)}</option>`);
        instrumentSelect.disabled = false;
        agreementSwitch.disabled = false;
    } else {
        instrumentSelect.innerHTML = '<option value="">ไม่มีเครื่องดนตรีในประเภทนี้</option>';
        instrumentSelect.disabled = true;
        agreementSwitch.disabled = true;
    }
    agreementSwitch.checked = false;
    checkBorrowButtonState();
}

function checkBorrowButtonState() {
    const instrumentSelect = document.getElementById('instrument-select');
    const agreementSwitch = document.getElementById('agreement-switch');
    const repairSwitch = document.getElementById('report-repair-switch');
    const borrowBtn = document.querySelector('.borrow-btn');
    if (!borrowBtn || !instrumentSelect || !agreementSwitch || !repairSwitch) return;

    const instrumentSelected = !!instrumentSelect.value;
    const isReportingRepair = repairSwitch.checked;

    // ถ้ากำลังแจ้งซ่อม: ขอแค่เลือกเครื่องดนตรี
    if (isReportingRepair) {
        borrowBtn.disabled = !instrumentSelected;
    } 
    // ถ้าเป็นการยืมปกติ: ต้องเลือกเครื่องและยอมรับข้อตกลง
    else {
        borrowBtn.disabled = !instrumentSelected || !agreementSwitch.checked;
    }

    // ✨ แสดง Switch แจ้งซ่อมเมื่อเลือกเครื่องแล้วเท่านั้น
    document.getElementById('report-repair-wrapper').classList.toggle('hidden', !instrumentSelected);
}

function getHistoryStatusV2(log) {
    // ลำดับความสำคัญ 1: สถานะการซ่อม (ถ้ามี)
    if (log.latest_repair_status) {
        switch (log.latest_repair_status) {
            case 'แจ้งซ่อม': return { text: 'แจ้งซ่อม', badgeClass: 'status-waiting' };
            case 'กำลังซ่อม': return { text: 'กำลังซ่อม', badgeClass: 'status-repairing' };
            case 'ซ่อมเสร็จสิ้น': return { text: 'ซ่อมเสร็จ', badgeClass: 'status-completed' };
            case 'ไม่สามารถซ่อมได้': return { text: 'ซ่อมไม่ได้', badgeClass: 'status-cannot-repair' };
        }
    }
    // ลำดับความสำคัญ 2: ยังไม่คืน
    if (!log.return_timestamp) {
        return { text: 'ยังไม่คืน', badgeClass: 'status-borrowing' };
    }
    // ลำดับความสำคัญ 3: เงื่อนไขการคืนแบบพิเศษ
    if (log.admin_forced_return) {
        return { text: 'บังคับคืน', badgeClass: 'status-forced-return' };
    }
    if (log.is_overdue) {
        return { text: 'คืนเกินเวลา', badgeClass: 'status-overdue' };
    }
    // สถานะปกติ: คืนแล้ว
    return { text: 'คืนแล้ว', badgeClass: 'status-completed' };
}

function filterMyHistory() {
    const listEl = document.getElementById('history-list');
    if (!listEl) return;
    const timeFilter = document.getElementById('history-filter-time');
    const statusFilter = document.getElementById('history-filter-status');
    const selectedTime = timeFilter?.value || 'all';
    const selectedStatus = statusFilter?.value || 'all';
    const now = new Date(), today = new Date(now.getFullYear(), now.getMonth(), now.getDate()), startOfWeek = new Date(today);
    startOfWeek.setDate(today.getDate() - today.getDay());
    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1), startOfYear = new Date(now.getFullYear(), 0, 1);
    const filteredHistory = allUserHistory.filter(log => {
        const logDate = new Date(log.borrow_timestamp);
        let passesTimeFilter = true;
        switch (selectedTime) {
            case 'today': passesTimeFilter = logDate >= today; break;
            case 'this_week': passesTimeFilter = logDate >= startOfWeek; break;
            case 'this_month': passesTimeFilter = logDate >= startOfMonth; break;
            case 'this_year': passesTimeFilter = logDate >= startOfYear; break;
        }
        const currentStatusKey = getRawHistoryStatus(log);
        return passesTimeFilter && (selectedStatus === 'all' || selectedStatus === currentStatusKey);
    });
    if (filteredHistory.length === 0) {
        listEl.innerHTML = `<div style="text-align:center;padding:2rem 1rem;opacity:0.7"><span style="font-size:3rem;line-height:1">📜</span><h5 style="margin:.5rem 0 .25rem">ไม่พบข้อมูลประวัติ</h5><p style="margin:0;font-size:.9rem">ลองปรับเงื่อนไขการค้นหา</p></div>`;
    } else {
        const html = filteredHistory.map(log => {
            const status = getHistoryStatus(log);

            // --- ✨ จุดที่แก้ไข ✨ ---
            // เพิ่มการตรวจสอบให้รัดกุมมากขึ้น ป้องกันกรณีข้อมูลเครื่องดนตรีถูกลบไปแล้ว
            let instrumentName = 'เครื่องดนตรีที่ถูกลบ';
            if (log.instrument && log.instrument.name) {
                instrumentName = log.instrument.name;
            } else if (log.instrument_name) {
                instrumentName = log.instrument_name;

    container.innerHTML = `<label for="knowledge-type-filter">เลือกประเภทเครื่องดนตรี</label><select id="knowledge-type-filter" aria-busy="true"><option>กำลังโหลด...</option></select><div id="knowledge-video-list" style="margin-top:1.5rem; max-height: 500px; overflow-y: auto;"></div>`;
    const typeFilter = container.querySelector('#knowledge-type-filter');
    typeFilter?.addEventListener('change', (e) => loadAndDisplayMedia(e.target.value));
    try {
        const { data: allTypesData, error: typesError } = await supabase.from('knowledge_links').select('instrument_type');
        if (typesError) throw typesError;
        const { data: borrowedData, error: borrowedError } = await supabase.from('borrow_logs').select('instrument:instruments(type)').eq('student_id', currentUser.id).is('return_timestamp', null).limit(1);
        if (borrowedError) throw borrowedError;
        const uniqueTypes = [...new Set(allTypesData.map(item => item.instrument_type).filter(Boolean))];
        typeFilter.innerHTML = '<option value="">-- เลือกประเภท --</option>';
        uniqueTypes.forEach(type => { typeFilter.innerHTML += `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`; });
        const currentlyBorrowedType = borrowedData?.[0]?.instrument?.type;
        if (currentlyBorrowedType && uniqueTypes.includes(currentlyBorrowedType)) {
            typeFilter.value = currentlyBorrowedType;
            loadAndDisplayMedia(currentlyBorrowedType);
        }
    } catch (err) {
        if(typeFilter) typeFilter.innerHTML = '<option>ผิดพลาด</option>';
    } finally {
        if(typeFilter) typeFilter.removeAttribute('aria-busy');
    }
}

async function loadAndDisplayMedia(instrumentType) {
    const mediaList = document.getElementById('knowledge-video-list');
    if (!mediaList) return;
    if (!instrumentType) { mediaList.innerHTML = ''; return; }
    mediaList.innerHTML = '<div aria-busy="true"></div>';
    try {
        const { data, error } = await supabase.rpc('get_knowledge_links_by_type', { p_instrument_type: instrumentType });
        if (error) throw error;
        if (!data || data.length === 0) {
            mediaList.innerHTML = '<p>ยังไม่มีวิดีโอสำหรับเครื่องดนตรีประเภทนี้</p>'; return;
        }
        const mediaHtml = data.map(link => {
            const mediaInfo = parseMediaUrl(link.youtube_url);
            if (!mediaInfo) return '';
            let platformBadge = '';
            if (mediaInfo.type === 'facebook') {
                platformBadge = `<span class="badge" style="background-color:#1877f2; color:white;">Facebook</span>`;
            } else if (mediaInfo.type === 'tiktok') {
                platformBadge = `<span class="badge" style="background-color:#000; color:white;">TikTok</span>`;
            } else if (mediaInfo.type === 'video' || mediaInfo.type === 'playlist') {
                platformBadge = `<span class="badge" style="background-color:#FF0000; color:white;">YouTube</span>`;
            }
            const titleText = mediaInfo.type === 'playlist' ? `${escapeHtml(link.title)} (เพลย์ลิสต์)` : escapeHtml(link.title);
            return `<article style="padding:0.75rem; margin:0">
                        <a href="${escapeHtml(mediaInfo.originalUrl)}" target="_blank" rel="noopener noreferrer" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; height:100%;">
                            <img src="${mediaInfo.thumbnailUrl}" alt="${titleText}" style="aspect-ratio:16/9; width:100%; object-fit:cover; border-radius:var(--pico-border-radius); background-color: #f0f0f0;">
                            <strong style="display:block; margin-top:.5rem; font-size:.9em; flex-grow:1;">${titleText}</strong>
                            <div style="margin-top:0.5rem;">${platformBadge}</div>
                        </a>
                    </article>`;
        }).join('');
        mediaList.innerHTML = `<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));">${mediaHtml}</div>`;
    } catch (err) {
        mediaList.innerHTML = '<p style="color:red">ไม่สามารถโหลดวิดีโอได้</p>';
    }
}

function setupSmartSidebar() {
    const adminContainer = document.querySelector('.admin-container');
    const sidebar = document.getElementById('admin-sidebar');
    const toggleButton = document.getElementById('sidebar-toggle-btn');
    const menuList = sidebar?.querySelector('.menu-list');

        if (menuList && !menuList.querySelector('[data-action="view-repair-history"]')) {
        const historyButton = menuList.querySelector('[data-action="view-history"]');
        const newButtonHtml = `<button data-action="view-repair-history">🔧<span>ประวัติการซ่อม</span></button>`;
        if (historyButton) {
            historyButton.insertAdjacentHTML('afterend', newButtonHtml);
        } else {
            menuList.innerHTML += newButtonHtml;
        }
    }

    if (adminContainer && sidebar && toggleButton && menuList) {
        const setSidebarCollapsed = (isCollapsed) => {
            sidebar.classList.toggle('collapsed', isCollapsed);
            adminContainer.classList.toggle('sidebar-is-collapsed', isCollapsed);
            const label = toggleButton.querySelector('.label');
            if (label) {
                label.textContent = isCollapsed ? '' : 'ย่อเมนู';
            }
        };

        const handleResize = () => {
            setSidebarCollapsed(window.innerWidth < 992);
        };

        toggleButton.addEventListener('click', () => {
            setSidebarCollapsed(!sidebar.classList.contains('collapsed'));
        });

        menuList.addEventListener('click', (e) => {
            const menuButton = e.target.closest('button[data-action]');
            if (menuButton) {
                sidebar.querySelector('.active')?.classList.remove('active');
                menuButton.classList.add('active');
                const action = menuButton.dataset.action;
                switch (action) {
                    case 'manage-users': renderUserManagementViewInModal(); break;
                    case 'manage-instruments': renderInstrumentManagementViewInModal(); break;
                    case 'manage-knowledge': handleManageKnowledge(); break;
                    case 'manage-badges': handleManageBadgeDefinitions(); break;
                    case 'view-history': renderAdminHistoryViewInModal(); break;
                    case 'view-repair-history': renderAdminRepairHistoryViewInModal(); break;
                    case 'view-ranking': renderPracticeReportViewInModal(); break;
                }
            }
        });

        window.addEventListener('resize', handleResize);
        handleResize(); // Initial check on page load
    }
}

async function renderLiveStatusView(containerId) {
    // หยุดนาฬิกาเก่าก่อนเริ่มใหม่ (ป้องกัน memory leak)
    if (adminTimerInterval) {
        clearInterval(adminTimerInterval);
    }

    const panel = document.getElementById(containerId);
    if (!panel) return;
    panel.innerHTML = '<div aria-busy="true"></div>';

    try {
        const { data: logs, error } = await supabase.rpc('admin_get_live_borrowing_status');
        if (error) throw error;

        if (!logs || logs.length === 0) {
            panel.innerHTML = '<p style="text-align: center; padding: 1.5rem 0;">ไม่มีเครื่องดนตรีที่กำลังถูกยืม ✨</p>';
            return;
        }

        const tableRows = logs.map(log => {
            let statusText = 'ยืมในโรงเรียน';
            let badgeClass = 'status-borrowing';
            if (log.is_take_home) {
                if (log.approval_status === 'pending') { statusText = 'รออนุมัติ'; badgeClass = 'status-waiting'; } 
                else if (log.approval_status === 'approved') { statusText = 'ยืมกลับบ้าน'; badgeClass = 'status-completed'; }
            }
            return `<tr>
                <td><label style="margin-bottom:0;"><input type="checkbox" class="admin-return-checkbox" data-log-id="${log.log_id}"></label></td>
                <td>${escapeHtml(log.student_name || 'N/A')}</td>
                <td>${escapeHtml(log.instrument_name || 'N/A')}</td>
                
                <td><span class="borrow-timer" data-borrow-time="${log.borrow_timestamp}">00:00:00</span></td>

                <td><span class="badge ${badgeClass}">${statusText}</span></td>
                <td><button type="button" class="admin-manage-borrow-btn secondary outline" data-id="${log.log_id}" data-student-id="${log.student_id}">จัดการ</button></td>
            </tr>`;
        }).join('');

        panel.innerHTML = `
            <form id="admin-return-form">
                <figure class="table-container">
                    <table role="grid">
                        <thead>
                            <tr>
                                <th style="width: 1%;"><label style="margin-bottom:0; padding: 0.5rem;"><input type="checkbox" id="admin-select-all-checkbox"></label></th>
                                <th>ผู้ยืม</th><th>เครื่องดนตรี</th>
                                <th>เวลายืม</th>
                                <th>สถานะ</th><th>จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="live-status-tbody">${tableRows}</tbody>
                    </table>
                </figure>
                <footer style="display:flex; justify-content:flex-end; margin-top: 1rem;">
                    <button type="button" id="admin-force-return-selected-btn" class="contrast">บังคับคืนที่เลือก</button>
                </footer>
            </form>`;
        
        // เริ่มการทำงานของนาฬิกาจับเวลา
        adminTimerInterval = setInterval(() => {
            document.querySelectorAll('#live-status-tbody .borrow-timer').forEach(timerEl => {
                const borrowTime = timerEl.dataset.borrowTime;
                if (borrowTime) {
                    timerEl.textContent = formatElapsedTime(borrowTime);
                }
            });
        }, 1000);
        
        // Event Listener สำหรับปุ่ม "จัดการ"
        const tableBody = panel.querySelector('#live-status-tbody');
        if (tableBody) {
             tableBody.addEventListener('click', (e) => {
                const button = e.target.closest('.admin-manage-borrow-btn');
                if (button) {
                    e.preventDefault();
                    e.stopPropagation();
                    const logId = button.dataset.id;
                    const studentId = button.dataset.studentId;
                    if (logId) {
                        handleManageBorrowLog(logId, studentId);
                    }
                }
            });
        }
    } catch (err) {
        panel.innerHTML = `<p style="color:red;">ไม่สามารถโหลดข้อมูลได้: ${err.message}</p>`;
    } finally {
        if (panel) panel.removeAttribute('aria-busy');
    }
}

// ฟังก์ชันสำหรับวาดเครื่องดนตรีในรูปแบบตาราง (ฉบับแก้ไข)
function renderInstrumentListAsTable(instrumentData, containerId) {
    const listContainer = document.getElementById(containerId);
    if (!listContainer) return;

    if (!instrumentData || instrumentData.length === 0) {
        listContainer.innerHTML = "<p style='text-align: center; padding: 2rem;'>ยังไม่มีเครื่องดนตรีในคลัง</p>";
        return;
    }
    
    const tableRows = instrumentData.map(ins => {
        const safeName = escapeHtml(ins.name);
        
        // --- New Badge Logic ---
        let statusBadge = '';
        if (ins.status === 'ถูกยืมอยู่') {
            statusBadge = `<span class="badge status-borrowing">${ins.status}</span>`;
        } else if (ins.status === 'ชำรุด') {
            statusBadge = `<span class="badge status-damaged">${ins.status}</span>`;
        } else { // 'พร้อมใช้งาน'
            statusBadge = `<span class="badge status-completed">${ins.status}</span>`;
        }

        const lastBorrowerCell = ins.last_borrower_name ? escapeHtml(ins.last_borrower_name) : `<i>-</i>`;
        
        const repairHistoryIcon = `🔧`;
        const editIcon = `✏️`;
        const deleteIcon = `🗑️`;
        const qrIcon = `📱`;
        
        const actionButtons = `
            <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:nowrap;">
                <button class="admin-qr-code-btn icon-button" data-id="${ins.id}" data-name="${safeName}" title="QR Code">${qrIcon}</button>
                <button class="admin-view-instrument-repair-history-btn icon-button" data-id="${ins.id}" data-name="${safeName}" title="ดูประวัติการซ่อม">${repairHistoryIcon}</button>
                <button class="admin-edit-instrument-btn icon-button" data-id="${ins.id}" title="แก้ไข">${editIcon}</button>
                <button class="admin-delete-instrument-btn icon-button secondary" data-id="${ins.id}" title="ลบ">${deleteIcon}</button>
            </div>
        `;

        return `
            <tr data-name="${safeName.toLowerCase()}" data-type="${escapeHtml(ins.type || '')}" data-condition="${escapeHtml(ins.condition || '')}">
                <td><img src="${escapeHtml(ins.image_url) || 'assets/default-instrument.png'}" onerror="this.onerror=null; this.src='assets/default-instrument.png';" alt="${safeName}" class="instrument-table-img"></td>
                <td>${safeName}</td>
                <td>${escapeHtml(ins.type) || 'N/A'}</td>
                <td>${escapeHtml(ins.condition) || 'N/A'}</td>
                <td>${statusBadge}</td>
                <td>${lastBorrowerCell}</td>
                <td class="action-cell">${actionButtons}</td>
            </tr>
        `;
    }).join('');

    listContainer.innerHTML = `
        <figure class="table-container" style="max-height: 45vh; overflow-y: auto;">
            <table role="grid">
                <thead>
                    <tr>
                        <th>รูป</th><th>ชื่อ</th><th>ประเภท</th><th>สภาพ</th><th>สถานะ</th><th>ผู้ยืมล่าสุด</th><th>จัดการ</th>
                    </tr>
                </thead>
                <tbody>${tableRows}</tbody>
            </table>
        </figure>
    `;
}

                if (view === 'card') {

        }
    });

        .select('class_level')
        .not('class_level', 'is', null)

        Swal.fire('ผิดพลาด', 'ไม่สามารถโหลดรายชื่อห้องเรียนได้', 'error');
        return;
    }
    const uniqueClasses = [...new Set(classes.map(c => c.class_level))];
    const classOptionsHtml = uniqueClasses.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');

    Swal.fire({
        title: 'รายงานเวลาซ้อม',
        html: `
            <div class="modal-filters" style="padding: 0.5rem 0; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <div>
                    <select id="report-type-filter" style="margin-bottom: 0;">
                        <option value="club" selected>สมาชิกชุมนุม</option>
                        <option value="class">รายห้องเรียน</option>
                    </select>
                    <select id="report-class-filter" class="hidden" style="margin-bottom: 0;">
                        <option value="">-- เลือกห้องเรียน --</option>
                        ${classOptionsHtml}
                    </select>
                </div>
                
                
                <button id="admin-reset-times-btn" class="secondary" style="--pico-background-color: var(--pico-color-red-550); --pico-border-color: var(--pico-color-red-600); color: white;">
                    ⚠️ รีเซ็ตเวลาซ้อมทั้งหมด
                </button>
                
            </div>
            <hr>
            <div id="modal-practice-report-container" aria-busy="true" style="min-height: 40vh; max-height: 60vh; overflow-y: auto;"></div>
        `,
        width: '80%',
        showCloseButton: true,
        showConfirmButton: false,
        didOpen: () => {
            const typeFilter = document.getElementById('report-type-filter');
            const classFilter = document.getElementById('report-class-filter');
            
            // ✨✨✨ เพิ่มโค้ดส่วนนี้เข้าไปทั้งหมด ✨✨✨
            const resetButton = document.getElementById('admin-reset-times-btn');

            resetButton.addEventListener('click', async () => {
                const { value: confirmation } = await Swal.fire({
                    title: '<span style="color: red;">ยืนยันการรีเซ็ต?</span>',
                    html: `การกระทำนี้จะล้างเวลาซ้อมทั้งหมดในระบบและ **ไม่สามารถย้อนกลับได้**<br><br>โปรดพิมพ์ <strong>RESET</strong> เพื่อยืนยัน`,
                    icon: 'warning',
                    input: 'text',
                    inputPlaceholder: 'พิมพ์ RESET ที่นี่',
                    showCancelButton: true,
                    confirmButtonText: 'ยืนยันการล้างข้อมูล',
                    confirmButtonColor: '#d33',
                    cancelButtonText: 'ยกเลิก',
                    inputValidator: (value) => {
                        if (value !== 'RESET') {
                            return 'คุณต้องพิมพ์ RESET ให้ถูกต้องเพื่อยืนยัน!'
                        }
                    }
                });

                if (confirmation === 'RESET') {
                    Swal.showLoading();
                    try {
                        const { data, error } = await supabase.rpc('admin_reset_all_practice_times');
                        if (error) throw error;
                        
                        await Swal.fire('สำเร็จ!', data, 'success');
                        // รีเฟรชข้อมูลในหน้าต่างนี้ใหม่
                        loadReport();
                        // รีเฟรชข้อมูลใน Dashboard หลักด้วย
                        refreshAdminDashboard();
                    } catch (err) {
                        await Swal.fire('ผิดพลาด!', err.message, 'error');
                    }
                }
            });
            // ✨✨✨ จบส่วนที่เพิ่มเข้ามา ✨✨✨

            // ฟังก์ชันสำหรับโหลดข้อมูลตามฟิลเตอร์ที่เลือก (โค้ดเดิม)
            const loadReport = () => {
                const filterType = typeFilter.value;
                const filterValue = classFilter.value;

                if (filterType === 'class' && !filterValue) {
                    // ถ้าเลือกดูรายห้องแต่ยังไม่เลือกห้อง ให้แสดงข้อความ
                    document.getElementById('modal-practice-report-container').innerHTML = '<p style="text-align:center; padding: 2rem;">กรุณาเลือกห้องเรียน</p>';
                    return;
                }
                // เรียกใช้ฟังก์ชันแสดงผลหลัก
                loadAndRenderAdminPracticeReport(filterType, filterValue);
            };

            // เพิ่ม Event Listener ให้ฟิลเตอร์
            typeFilter.addEventListener('change', () => {
                classFilter.classList.toggle('hidden', typeFilter.value !== 'class');
                loadReport();
            });
            classFilter.addEventListener('change', loadReport);

            // โหลดข้อมูลเริ่มต้น (สมาชิกชุมนุม)
            loadReport();
        }
    });
}

// 2. สร้างฟังก์ชันใหม่สำหรับดึงและแสดงผลข้อมูล
async function loadAndRenderAdminPracticeReport(filterType, filterValue) {
    const container = document.getElementById('modal-practice-report-container');
    if (!container) return;
    container.setAttribute('aria-busy', 'true');

    try {
        const { data, error } = await supabase.rpc('admin_get_practice_report', {
            p_filter_type: filterType,
            p_filter_value: filterValue
        });
        if (error) throw error;

        if (!data || data.length === 0) {
            container.innerHTML = '<p style="text-align: center; padding: 2rem;">ไม่พบข้อมูลสำหรับเงื่อนไขนี้</p>';
            return;
        }

        // สร้างตารางโดยไม่ใช้ฟังก์ชันแม่แบบ (เพราะไม่ต้องไฮไลท์ผู้ใช้ปัจจุบัน)
        const tableRows = data.map(row => `
            <tr>
                <td style="width: 1%; text-align: center;">${row.rank}</td>
                <td>${escapeHtml(row.full_name)}</td>
                <td style="width: 1%; white-space: nowrap; text-align: right;">${formatMinutesToHoursMinutes(row.total_minutes)}</td>
            </tr>
        `).join('');

        container.innerHTML = `
            <table role="grid">
                <thead>
                    <tr>
                        <th style="width: 1%; text-align: center; min-width: 120px;">อันดับ</th>
                        <th>ชื่อ</th>
                        <th style="text-align: right; min-width: 200px;">เวลาซ้อม (ชม.)</th>
                    </tr>
                </thead>
                <tbody>${tableRows}</tbody>
            </table>
        `;

    } catch (err) {
        container.innerHTML = `<p style="color:red;">โหลดข้อมูลล้มเหลว: ${err.message}</p>`;
    } finally {
        if (container) {
            container.removeAttribute('aria-busy');
        }
    }
}

// ฟังก์ชันตัวช่วย: สำหรับสร้างป้ายสถานะ (Badge) ที่ถูกต้อง
function getStatusBadge(log) {
    // 1. ถ้ามีสถานะการซ่อมล่าสุด ให้แสดงสถานะนั้นก่อนเสมอ
    if (log.current_repair_status) {
        switch (log.current_repair_status) {
            case 'กำลังซ่อม':
                return `<span class="badge status-repairing">${log.current_repair_status}</span>`;
            case 'ซ่อมเสร็จสิ้น':
                return `<span class="badge status-completed">${log.current_repair_status}</span>`;
            case 'ไม่สามารถซ่อมได้':
                 return `<span class="badge status-rejected">${log.current_repair_status}</span>`;
            // กรณีมีสถานะอื่นๆ ที่อาจเพิ่มในอนาคต
            default:
                return `<span class="badge status-waiting">${log.current_repair_status}</span>`;
        }
    }

    // 2. ถ้าไม่มีสถานะซ่อม แต่มีการแจ้งปัญหาไว้ (คือเพิ่งแจ้งไปหมาดๆ)
    if (log.problem_description && log.return_timestamp) {
        return `<span class="badge status-waiting">แจ้งซ่อม</span>`;
    }

    // 3. ถ้าเป็นการคืนปกติ
    if (log.return_timestamp) {
        return `<span class="badge status-returned">คืนแล้ว</span>`;
    }

    // 4. ถ้ายังไม่คืน
    return `<span class="badge status-borrowed">กำลังยืม</span>`;
}


// ฟังก์ชันหลัก: สำหรับแสดงผลประวัติทั้งหมด
async function renderHistoryView(containerId) {
    const historyContainer = document.getElementById(containerId);
    if (!historyContainer) return;

    // เราจะใช้โครงสร้างนี้เพื่อแสดงผล
    historyContainer.innerHTML = `
        <h3>ประวัติการยืม-คืน</h3>
        <div id="history-list" aria-busy="true">กำลังโหลดประวัติ...</div>
    `;
    const listContainer = document.getElementById('history-list');

    try {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) throw new Error("ไม่พบข้อมูลผู้ใช้");

        // เรียกใช้ฟังก์ชันในฐานข้อมูลที่เราเพิ่งอัปเกรดไป
        const { data: history, error } = await supabase.rpc('get_user_borrow_history', { p_user_id: user.id });
        if (error) throw error;

        if (!history || history.length === 0) {
            listContainer.innerHTML = '<p>ยังไม่มีประวัติการยืม-คืน</p>';
            return;
        }

        const historyHtml = history.map(log => {
            const borrowDate = new Date(log.borrow_timestamp).toLocaleString('th-TH', { dateStyle: 'short', timeStyle: 'short' });
            const returnDate = log.return_timestamp ? new Date(log.return_timestamp).toLocaleString('th-TH', { dateStyle: 'short', timeStyle: 'short' }) : '';

            // เรียกใช้ฟังก์ชันตัวช่วยเพื่อรับป้ายสถานะที่ถูกต้อง
            const statusBadge = getStatusBadge(log);

            // สร้าง HTML สำหรับแต่ละรายการ
            return `
                <div class="history-item">
                    <div class="history-item-header">
                        <h5>${escapeHtml(log.instrument_name)}</h5>
                        ${statusBadge}
                    </div>
                    <div class="history-item-body">
                        <p><strong>ยืม:</strong> ${borrowDate} น.</p>
                        ${log.return_timestamp ? `<p><strong>คืน:</strong> ${returnDate} น.</p>` : ''}
                        ${log.problem_description ? `<p class="problem-desc"><strong>ปัญหาที่แจ้ง:</strong> ${escapeHtml(log.problem_description)}</p>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        listContainer.innerHTML = historyHtml;

    } catch (err) {
        listContainer.innerHTML = `<p style="color:red;">ไม่สามารถโหลดประวัติได้: ${err.message}</p>`;
    } finally {
        listContainer.removeAttribute('aria-busy');
    }
}

async function refreshAdminDashboard() {
    // Check if the admin dashboard is currently visible
    if (!document.getElementById('admin-stats')) {
        console.log("Admin dashboard not visible. Skipping refresh.");
        return;
    }

    console.log("🚀 Real-time change detected! Refreshing admin dashboard...");

    // Use Promise.all to refresh all panels concurrently for better performance
    await Promise.all([
        renderAdminStats(),
        renderApprovalView('approvals-panel'),
        renderRepairReportsView('repairs-panel'),
        renderLatestSignups('latest-signups-panel'),
        renderBlockedUsers('blocked-users-panel'),
        renderLiveStatusView('live-status-container')
    ]);
    console.log("✅ Admin dashboard refreshed.");
}

function setupAdminRealtimeSubscriptions() {
    // If a channel already exists, do nothing.
    if (adminRealtimeChannel) {
        return;
    }

    console.log('Subscribing to admin real-time updates...');
    
    // Create a single channel to listen to all relevant changes
    adminRealtimeChannel = supabase.channel('admin-dashboard-updates')
        .on('postgres_changes', 
            { event: '*', schema: 'public', table: 'borrow_logs' },
            () => refreshAdminDashboard()
        )
        .on('postgres_changes', 
            { event: '*', schema: 'public', table: 'repair_logs' },
            () => refreshAdminDashboard()
        )
        .on('postgres_changes', 
            { event: '*', schema: 'public', table: 'users' },
            () => refreshAdminDashboard()
        )
        .subscribe((status, err) => {
            if (status === 'SUBSCRIBED') {
                console.log('Successfully subscribed to admin updates!');
            }
            if (err) {
                console.error('Error subscribing to admin updates:', err);
            }
        });
}

async function cleanupAdminSubscriptions() {
    if (adminRealtimeChannel) {
        console.log('Unsubscribing from admin real-time updates...');
        await supabase.removeChannel(adminRealtimeChannel);
        adminRealtimeChannel = null;
    }
}

async function renderLatestSignups(containerId) {
    const panel = document.getElementById(containerId);
    if (!panel) return;
    // This was the source of the error. We need to query from the panel, not the contentContainer.
    const contentContainer = panel.querySelector('div[aria-busy]');
    if (!contentContainer) {
        console.error(`Could not find the content container inside #${containerId}`);
        // As a fallback, let's just use the panel itself.
        panel.setAttribute('aria-busy', 'true');
    } else {
        contentContainer.setAttribute('aria-busy', 'true');
    }

    try {
        const { data: users, error } = await supabase.rpc('get_latest_signups', { p_limit: 5 });
        if (error) throw error;

        const targetEl = contentContainer || panel;

        if (!users || users.length === 0) {
            targetEl.innerHTML = '<p style="text-align: center;">ยังไม่มีผู้สมัครใหม่</p>';
            return;
        }

        const userListHtml = users.map(user => `
            <li style="display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px dashed var(--pico-muted-border-color);">
                <img src="${escapeHtml(user.profile_image_url || 'assets/default-avatar.png')}" 
                     onerror="this.onerror=null; this.src='assets/default-avatar.png';" 
                     alt="Profile" 
                     style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
                <div style="line-height: 1.2; flex-grow: 1;">
                    <strong>${escapeHtml(user.full_name)}</strong>

                <small style="flex-shrink: 0;">${timeAgo(user.created_at)}</small>

        targetEl.innerHTML = `
            <ul style="list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto;">
                ${userListHtml}
            </ul>
        `;

    } catch (err) {
        const targetEl = contentContainer || panel;
        targetEl.innerHTML = `<p style="color:red;">ไม่สามารถโหลดข้อมูลได้: ${err.message}</p>`;
    } finally {
        const targetEl = contentContainer || panel;

    }

async function refreshInstrumentManagementModal(state = {}) {
    const container = document.getElementById('modal-instrument-list-container');
    if (!container) return;
    container.innerHTML = '<div aria-busy="true">กำลังรีเฟรช...</div>';

    try {
        const { data, error } = await supabase.rpc('get_all_instruments');
        if (error) throw error;
        
        const instrumentData = data || [];
        cachedInstrumentList = instrumentData;

        const cardViewBtn = document.getElementById('instrument-card-view-btn');
        const listViewBtn = document.getElementById('instrument-list-view-btn');
        
        const switchView = (view) => {
            localStorage.setItem('instrument_view', view);
            cardViewBtn.classList.toggle('active', view === 'card');
            listViewBtn.classList.toggle('active', view === 'list');
            if (view === 'card') {
                loadAndRenderAllInstruments(instrumentData, 'modal-instrument-list-container'); 
            } else {
                renderInstrumentListAsTable(instrumentData, 'modal-instrument-list-container');
            }
            filterInstrumentTable(); // Re-apply filters after rendering
            requestAnimationFrame(() => {
                if(container) container.scrollTop = state.savedScrollTop || 0;
            });
        };

        const preferredView = localStorage.getItem('instrument_view') || 'card';
        switchView(preferredView);

        // Re-attach view switcher listeners if they were lost
        cardViewBtn.onclick = () => switchView('card');
        listViewBtn.onclick = () => switchView('list');

        // Populate type filter
        const typeFilter = document.querySelector('#instrument-type-filter-modal');
        if (typeFilter) {
            const currentVal = typeFilter.value;
            const types = [...new Set(instrumentData.map(i => i.type).filter(Boolean))];
            typeFilter.innerHTML = '<option value="all">แสดงทุกประเภท</option>' + types.map(type => `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`).join('');
            typeFilter.value = currentVal;
        }

    } catch (err) {
        container.innerHTML = `<p style="color:red;">โหลดข้อมูลล้มเหลว: ${err.message}</p>`;
    }
}
