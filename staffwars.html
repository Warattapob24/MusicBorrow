<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Wars: Pitch Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #0c0a1a; color: #e0e0e0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale; touch-action: manipulation;
        }
        .game-container {
            width: 100%; max-width: 800px; padding: 1rem;
            background: rgba(18, 16, 41, 0.8); border-radius: 20px;
            border: 1px solid rgba(136, 71, 255, 0.5);
            box-shadow: 0 0 30px rgba(136, 71, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        .staff-container {
            position: relative;
            width: 100%;
            height: 200px; /* <--- ปรับความสูงเป็น 200px */
            margin: 2rem 0; /* <--- ปรับระยะห่างเป็น 2rem */
        }
        .staff-line { position: absolute; width: 100%; height: 2px; background-color: rgba(255, 255, 255, 0.7); left: 0; }
        .clef { position: absolute; height: 140%; width: auto; top: 50%; transform: translateY(-50%); left: 10px; fill: #f0f0f0; stroke: #f0f0f0; }
        .note-wrapper { position: absolute; left: 50%; transform: translateX(-50%); transition: all 0.2s ease-out; }
        .note-wrapper.correct { transform: translateX(-50%) scale(1.5) rotate(15deg); opacity: 0; }
        .note-head { 
            position: relative; 
            width: 30px; 
            height: 24px; 
            background-color: #00f2ff; 
            border-radius: 50%; 
            transform: rotate(-15deg); 
            box-shadow: 0 0 15px #00f2ff, 0 0 25px #00f2ff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .note-accidental { font-size: 24px; font-weight: bold; color: #0c0a1a; transform: rotate(15deg); }
        .note-stem { position: absolute; width: 3px; background-color: #00f2ff; }
        .note-head.up .note-stem { height: 70px; bottom: 12px; left: 2px; }
        .note-head.down .note-stem { height: 70px; top: 12px; right: 2px; }
        .ledger-line { 
            position: absolute; 
            width: 45px; 
            height: 2px; 
            background-color: rgba(255, 255, 255, 0.7); 
            left: 50%; 
            transform: translateX(-50%);
            top: 11px; /* เพิ่มค่านี้เพื่อให้เส้นอยู่กลางหัวโน้ต */
        }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .modal-content { background: #121029; padding: 2rem; border-radius: 15px; border: 1px solid #8847ff; box-shadow: 0 0 30px rgba(136, 71, 255, 0.5); text-align: center; width: 90%; max-width: 500px; }
        .accidental-selector button { background-color: #374151; color: #D1D5DB; border: 2px solid transparent; transition: all 0.2s; }
        .accidental-selector button.active { background-color: #4f46e5; color: white; border-color: #818cf8; }
        .study-mode-toggle .dot { transition: transform 0.2s ease-in-out; }
        .study-mode-toggle input:checked ~ .dot { transform: translateX(100%); }
        .study-mode-toggle input:checked ~ div:first-of-type { background-color: #22c55e; }
        #keyboard-container { height: 160px; transition: opacity 0.3s; }
        .key { border: 2px solid #0c0a1a; border-top: none; border-radius: 0 0 8px 8px; cursor: pointer; transition: all 0.1s ease-out; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-weight: 600; }
        .key.unclickable { cursor: default; }
        .key.white { background-color: #d1d5db; color: #1f2937; height: 100%; width: 14.28%; }
        .key.black { background-color: #1f2937; color: #e0e0e0; height: 65%; width: 10%; position: absolute; z-index: 10; }
        .key:active { transform: scale(0.98) translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.2); }
        .key.correct { background: #22c55e; border-color: #16a34a; color: white; }
        .key.incorrect { background: #ef4444; border-color: #dc2626; color: white; animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .key[data-note="C#"] { left: 9.28%; } .key[data-note="D#"] { left: 23.57%; } .key[data-note="F#"] { left: 52.14%; }
        .key[data-note="G#"] { left: 66.42%; } .key[data-note="A#"] { left: 80.71%; }
        /* สไตล์สำหรับครอบ SVG */
        /* ทำให้ SVG ยืดเต็มพื้นที่ container */
        .note-svg-container svg {
            width: 100%;
            height: 100%;
        }

        /* คลาสสำหรับกลับหัวโน้ต */
        .note-svg-container.stem-down {
            transform: rotate(180deg);
        }

        /* ปรับตำแหน่งเครื่องหมายแปลงเสียงใหม่ */
        .note-accidental {
            position: absolute;
            left: -25px; /* จัดให้อยู่ด้านซ้ายของโน้ต */
            top: 50%;
            transform: translateY(-50%);
            font-size: 32px;
            font-weight: bold;
            color: #e0e0e0;
        }

        /* ปรับตำแหน่งเส้น Ledger Line ใหม่ให้อยู่กลางหัวโน้ต */
        .ledger-line {
            top: 50%;
            transform: translate(-50%, -50%);
        }

#close-game-btn {
    background-color: #7f1d1d; /* สีแดงเข้ม */
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
    transition: background-color 0.2s;
}

#close-game-btn:hover {
    background-color: #991b1b; /* สีแดงเข้มขึ้นเมื่อ hover */
}

</head>
<body>
    <main id="game-ui" class="game-container">
        <header class="flex justify-between items-center mb-2">
            <div>
            <h1 class="text-2xl md:text-3xl font-bold text-white tracking-wider">⚔️ Staff Wars</h1>
                <p id="user-info" class="text-sm text-slate-300"></p>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-xl font-bold">Level: <span id="level">1</span></div>
                <div class="text-xl font-bold">คะแนน: <span id="score">0</span></div>
                <div class="text-xl font-bold">เวลา: <span id="timer">60</span></div>
                <button id="mute-btn" class="p-2 rounded-full bg-slate-700 hover:bg-slate-600">🔊</button>
                <button id="close-game-btn" class="p-2 rounded-full bg-red-600 hover:bg-red-500 text-white font-bold text-xl">X</button>
            </div>
        </header>

        <div id="staff-container" class="staff-container"></div>
        
        <div id="feedback-panel" class="text-center min-h-[200px] pt-4">
            <div id="sound-feedback-container">
                 <p id="feedback-text" class="text-xl font-bold h-8 mb-2 text-cyan-400"></p>
                 <div id="tuner-ui">
                     <div class="relative w-full h-2 bg-slate-700 rounded-full overflow-hidden">
                         <div class="absolute w-0.5 h-full bg-white/50 left-1/2 -translate-x-1/2"></div>
                         <div id="tuner-indicator" class="absolute top-0 w-2 h-full bg-amber-400 rounded-full" style="left: 50%; transform: translateX(-50%);"></div>
                     </div>
                     <div class="flex justify-between text-xs px-1 text-slate-400"><span>ต่ำไป</span><span>ตรงกลาง</span><span>สูงไป</span></div>
                 </div>
            </div>
            <div id="keyboard-wrapper" class="hidden">
                <div id="keyboard-container" class="relative w-full mb-2 flex"></div>
                <label class="study-mode-toggle flex justify-end items-center gap-2 cursor-pointer pr-1">
                    <span class="text-sm font-bold text-slate-300">แสดงชื่อโน้ต</span>
                    <div class="relative">
                        <input type="checkbox" id="in-game-show-labels-toggle" class="sr-only peer">
                        <div class="block bg-slate-600 w-10 h-6 rounded-full peer-checked:bg-cyan-500"></div>
                        <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition peer-checked:translate-x-full"></div>
                    </div>
                </label>
            </div>
        </div>
    </main>

    <div id="modal-overlay" class="modal-overlay">
        <div id="modal-content" class="modal-content">
            <div id="start-screen">
                <h2 class="text-4xl font-bold mb-4">Pitch Command</h2>
                <p class="text-lg text-slate-300 mb-6">ตั้งค่าสมรภูมิแล้วเริ่มรบ!</p>
                <div class="space-y-3 mb-6">
                    <select id="clef-select" class="w-full bg-slate-700 border border-slate-600 rounded-md p-2 text-white">
                        <option value="g">กุญแจซอล (Treble)</option>
                        <option value="f">กุญแจฟา (Bass)</option>
                        <option value="c-alto">กุญแจอัลโต (Alto)</option>
                        <option value="c-tenor">กุญแจเทเนอร์ (Tenor)</option>
                    </select>
                    <select id="mode-select" class="w-full bg-slate-700 border border-slate-600 rounded-md p-2 text-white">
                        <option value="sound">โหมดเสียง 🎤</option>
                        <option value="keyboard">โหมดคีย์บอร์ด 🎹</option>
                    </select>
                    <select id="transposition-select" class="w-full bg-slate-700 border border-slate-600 rounded-md p-2 text-white">
                        <option value="0">เครื่อง C (เสียงตรง)</option>
                        <option value="-2">เครื่อง B♭ (เช่น ทรัมเป็ต)</option>
                        <option value="-9">เครื่อง E♭ (เช่น แซกโซโฟน)</option>
                    </select>
                     <div id="keyboard-options-modal">
                         <div class="bg-slate-800 p-3 rounded-lg text-left">
                             <label class="text-white font-bold mb-2 block">เครื่องหมายแปลงเสียง</label>
<div id="accidental-selector" class="accidental-selector grid grid-cols-2 gap-2">
    <button data-value="naturals" class="p-2 rounded-md font-semibold text-xl">♮</button>
    <button data-value="accidentals" class="p-2 rounded-md font-semibold text-xl">♯/♭</button>
</div>
                         </div>
                     </div>
                </div>
                <button id="start-btn" class="w-full bg-cyan-500 text-slate-900 font-bold py-3 px-6 rounded-lg text-xl hover:bg-cyan-400">เริ่มเกม</button>
            </div>
             <div id="game-over-screen" class="hidden text-center">
                 <h2 class="text-4xl font-bold mb-2">หมดเวลา!</h2>
                 <p class="text-lg text-slate-300 mb-4">คะแนนสุดท้ายของคุณคือ</p>
                 <p id="final-score" class="text-6xl font-bold text-cyan-400 mb-6">0</p>
                 <button id="restart-btn" class="w-full bg-cyan-500 text-slate-900 font-bold py-3 px-6 rounded-lg">เล่นอีกครั้ง</button>
                    <button id="exit-game-over-btn" style="background-color: #7f1d1d; margin-top: 10px; padding: 10px 20px; border-radius: 8px; color: white;">ออก</button>
                </div>
        </div>
    </div>

            init() {
                this.cacheDOMElements();
                this.precalculateFrequencies();
                this.setupAudio();
                this.bindEvents();
                this.resetGame();
            },

            cacheDOMElements() {
                const ids = [
                    'score', 'timer', 'staff-container', 'feedback-panel', 'feedback-text', 'tuner-ui',
                    'tuner-indicator', 'modal-overlay', 'modal-content', 'start-screen', 'game-over-screen',
                    'start-btn', 'restart-btn', 'final-score', 'clef-select', 'mode-select', 'mute-btn',
                    'accidental-selector', 'keyboard-options-modal', 'in-game-show-labels-toggle',
                    'sound-feedback-container', 'keyboard-wrapper', 'keyboard-container', 'transposition-select'
                ];
                ids.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        const camelCaseId = id.replace(/-([a-z])/g, g => g[1].toUpperCase());
                        this.els[camelCaseId] = el;
                    }
                });
            },

            setupAudio() {
                this.audio.bgMusic = new Audio('https://cdn.pixabay.com/audio/2025/05/03/audio_327c570a65.mp3');
                this.audio.bgMusic.loop = true;
                this.audio.bgMusic.volume = 0.25;
                this.audio.correct = new Audio('https://cdn.pixabay.com/audio/2025/06/21/audio_d2e98a6f49.mp3');
                this.audio.correct.volume = 0.7;
                this.audio.incorrect = new Audio('https://cdn.pixabay.com/audio/2025/04/14/audio_fa4f3e1533.mp3');
                this.audio.incorrect.volume = 0.7;
                this.audio.start = new Audio('https://cdn.pixabay.com/audio/2022/03/10/audio_edf7b16049.mp3');
                this.audio.start.volume = 0.7;
                this.audio.end = new Audio('https://cdn.pixabay.com/audio/2025/06/26/audio_0ef82a1331.mp3');
                this.audio.end.volume = 0.7;
            },

            playSound(sound) {
                if (!sound || (this.state.isMuted && sound !== this.audio.start)) return;
                sound.currentTime = 0;
                sound.play().catch(() => {});
            },

            toggleMute() {
                this.state.isMuted = !this.state.isMuted;
                this.els.muteBtn.textContent = this.state.isMuted ? '🔇' : '🔊';
                if (this.audio.bgMusic) this.audio.bgMusic.muted = this.state.isMuted;
            },

            playPianoNote(noteName) {
            // สร้าง AudioContext ถ้ายังไม่มี (จำเป็นสำหรับ Web Audio API)
            if (!this.state.audioContext) {
                this.state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            // จัดการกรณีที่เบราว์เซอร์บล็อกเสียงก่อนผู้ใช้จะคลิก
            if (this.state.audioContext.state === 'suspended') {
                this.state.audioContext.resume();
            }

            const freq = this.config.NOTE_FREQUENCIES[noteName];
            // ถ้าหาความถี่ไม่เจอ หรือปิดเสียงอยู่ ให้หยุดทำงาน
            if (!freq || this.state.isMuted) return;

            // 1. สร้างต้นกำเนิดเสียง (Oscillator)
            const oscillator = this.state.audioContext.createOscillator();
            // 2. สร้างตัวควบคุมความดัง (GainNode) เพื่อทำให้เสียงไม่แข็งทื่อ
            const gainNode = this.state.audioContext.createGain();

            // 3. ต่อวงจรเสียง: Oscillator -> Gain -> ลำโพง
            oscillator.connect(gainNode);
            gainNode.connect(this.state.audioContext.destination);

            // 4. ตั้งค่าเสียง
            oscillator.type = 'triangle'; // ใช้คลื่นเสียงทรงสามเหลี่ยม จะได้เสียงคล้ายๆ Electric Piano
            oscillator.frequency.setValueAtTime(freq, this.state.audioContext.currentTime);

            // 5. สร้างซองเสียง (Envelope) ให้เหมือนการกดคีย์เปียโน (กดแล้วเสียงค่อยๆ หายไป)
            const now = this.state.audioContext.currentTime;
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.3, now + 0.01); // Attack: เสียงดังขึ้นอย่างรวดเร็ว
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.5); // Decay: เสียงค่อยๆ เบาลงจนเงียบ

            // 6. เริ่มเล่นและตั้งเวลาหยุด
            oscillator.start(now);
            oscillator.stop(now + 0.5);
        },

            bindEvents() {
                this.els.startBtn.addEventListener('click', () => this.startGame());
                this.els.restartBtn.addEventListener('click', () => this.resetGame());
                this.els.muteBtn.addEventListener('click', () => this.toggleMute());
                this.els.modeSelect.addEventListener('change', () => this.handleModeChange());
                this.els.clefSelect.addEventListener('change', (e) => this.handleClefChange(e));
                this.els.accidentalSelector.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        this.setAccidentalPreference(e.target.dataset.value);
                    }
                });
                this.els.inGameShowLabelsToggle.addEventListener('change', () => this.createKeyboard());
            },

            resetGame() {
                if (this.state.timerInterval) clearInterval(this.state.timerInterval);
                if (this.audio.bgMusic) this.audio.bgMusic.pause();
                
            this.state = {
                score: 0,
                timeLeft: this.config.INITIAL_TIME,
                currentNoteKey: null,
                isGameActive: false,
                isChecking: false,
                correctPitchStartTime: null, // <--- เพิ่มตัวนี้กลับมา
                timerInterval: null,
                audioContext: null,
                analyser: null,
                mediaStream: null,
                pitchLoopId: null,
                };
                
                this.els.gameOverScreen.classList.add('hidden');
                this.els.startScreen.classList.remove('hidden');
                this.els.modalOverlay.classList.remove('hidden');
                
                this.els.score.textContent = '0';
                this.els.timer.textContent = this.config.INITIAL_TIME;
                this.setControlsDisabled(false);
                this.handleModeChange();
                this.setAccidentalPreference('accidentals');
                this.els.staffContainer.innerHTML = '';
            },

            async startGame() {
                if (this.state.isGameActive) return;
                // หากข้อมูลผู้ใช้ยังไม่มา (Undefined) ให้รอ 500ms แล้วลองใหม่ แทนการปล่อยให้พัง
                if (!currentUserData) {
                    setTimeout(() => this.startGame(), 500);
                    return;
                }
                this.playSound(this.audio.start);
                this.els.startBtn.disabled = true;
                
                this.state.currentClef = this.els.clefSelect.value;
                this.state.currentMode = this.els.modeSelect.value;
                this.state.transposition = parseInt(this.els.transpositionSelect.value, 10);
                
                if (this.state.currentMode === 'sound') {
                    const micReady = await this.setupPitchDetection();
                    if (!micReady) {
                        alert('ไม่สามารถเข้าถึงไมโครโฟนได้ โปรดตรวจสอบการตั้งค่า');
                        this.resetGame(); // กลับไปหน้าแรก
                        return;
                    }
                }
                
                this.state.isGameActive = true;
                this.els.modalOverlay.classList.add('hidden');
                this.setControlsDisabled(true);
                if (!this.state.isMuted) this.playSound(this.audio.bgMusic);

                this.drawStaff();
                this.generateNewNote();
                this.state.timerInterval = setInterval(() => this.updateTimer(), 1000);
                
                if (this.state.currentMode === 'sound') {
                    this.getPitch();
                }
                this.els.startBtn.disabled = false;
                gameStartTime = Date.now(); // Record start time                
            },

            async endGame() {
                this.state.isGameActive = false;
                if(this.state.timerInterval) clearInterval(this.state.timerInterval);
                this.state.timerInterval = null;
                this.stopPitchDetection();
                if (this.audio.bgMusic) this.audio.bgMusic.pause();
                this.playSound(this.audio.end);
                
                this.els.finalScore.textContent = this.state.score;
                this.els.startScreen.classList.add('hidden');
                this.els.gameOverScreen.classList.remove('hidden');
                this.els.modalOverlay.classList.remove('hidden');

                if (!currentUserData) return;

                // 1. Calculate and log practice time
                const gameEndTime = Date.now();
                const durationMs = gameEndTime - gameStartTime;
                
                // อุดช่องโหว่การปั๊มเวลา: ใช้ Math.floor และบังคับให้เวลาเป็น 0 หากเล่นไม่ถึง 30 วินาที
                let durationInMinutes = Math.floor(durationMs / 60000);
                if (durationMs < 30000) {
                    durationInMinutes = 0; // ตัดสิทธิ์การได้เวลาหากซ้อมน้อยกว่า 30 วินาที
                } else if (durationInMinutes === 0) {
                    durationInMinutes = 1; // อนุโลมให้ 1 นาที หากตั้งใจเล่นผ่านช่วง 30-59 วินาทีแรกมาได้
                }

                // ส่งคะแนนกลับไปที่แท็บ Dashboard (opener) อย่างปลอดภัย
                const targetWindow = window.opener || window.parent;
                if (targetWindow) {
                    targetWindow.postMessage({
                        type: 'GAME_OVER',
                        payload: { gameName: 'staffwars', score: this.state.score, duration: durationInMinutes }
                    }, '*');
                }
            },
            
            updateTimer() {
                if (!this.state.isGameActive) return;
                this.state.timeLeft--;
                this.els.timer.textContent = this.state.timeLeft;
                if (this.state.timeLeft <= 0) {
                    this.endGame();
                }
            },
            
            setControlsDisabled(disabled) {
                this.els.clefSelect.disabled = disabled;
                this.els.transpositionSelect.disabled = disabled;
                this.els.modeSelect.disabled = disabled;
                this.els.accidentalSelector.querySelectorAll('button').forEach(btn => btn.disabled = disabled);
            },
            
            handleModeChange() {
                const mode = this.els.modeSelect.value;
                const isSoundMode = mode === 'sound';
                this.els.transpositionSelect.style.display = isSoundMode ? 'block' : 'none';
            },
            
            handleClefChange(e) {
                this.state.currentClef = e.target.value;
                if (this.state.isGameActive) {
                    this.drawStaff();
                    this.generateNewNote();
                } else {
                     this.drawStaff();
                }
            },
            
            drawStaff() {
                this.els.staffContainer.innerHTML = '';
                const clefData = this.config.CLEF_DATA[this.state.currentClef];
                const clefSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                clefSvg.setAttribute('class', 'clef');
                clefSvg.setAttribute('viewBox', clefData.viewBox);
                clefSvg.innerHTML = clefData.path;

            if (this.state.currentClef === 'c-alto') clefSvg.style.transform = 'translateY(-50%) translateX(-28%) scale(0.29)';
            else if (this.state.currentClef === 'c-tenor') clefSvg.style.transform = 'translateY(-57%) translateX(-28%) scale(0.29)';
            else if (this.state.currentClef === 'f') clefSvg.style.transform = 'translateY(-52.5%) translateX(-28%) scale(0.25)';
            else if (this.state.currentClef === 'g') clefSvg.style.transform = 'translateY(-50%) translateX(-30%) scale(0.65)';
                
                this.els.staffContainer.appendChild(clefSvg);
            for (let i = 0; i < 5; i++) {
                const line = document.createElement('div');
                line.className = 'staff-line';
                line.style.top = `${60 + i * 20}px`; // ใช้ค่า pixel แบบคงที่
                this.els.staffContainer.appendChild(line);
            }
        },

        generateNewNote() {
            const currentNotes = this.config.NOTES[this.state.currentClef];
            let notePool = Object.keys(currentNotes);
            const preference = this.state.accidentalPreference;

            if (preference === 'naturals') {
                notePool = notePool.filter(note => !note.includes('#'));
            }
            
            // --- ตรรกะใหม่: เพิ่มโอกาสให้โน้ต #/b ออกบ่อยขึ้น ---
            if (preference === 'accidentals' || preference === 'all') {
                const accidentalChance = 0.5; // << 📍 ปรับค่าตรงนี้! (0.5 = 50%)

                if (Math.random() < accidentalChance) {
                    // ถ้าสุ่มติด 50% นี้ ให้ "บังคับ" สุ่มเฉพาะโน้ต #/b
                    const sharpsPool = notePool.filter(note => note.includes('#'));
                    if (sharpsPool.length > 0) {
                        this.state.currentNoteKey = sharpsPool[Math.floor(Math.random() * sharpsPool.length)];
                    } else {
                        // กรณีฉุกเฉิน ถ้าไม่มีโน้ต #/b ให้สุ่มจากทั้งหมดแทน
                        this.state.currentNoteKey = notePool[Math.floor(Math.random() * notePool.length)];
                    }
                } else {
                    // ถ้าไม่ติด 50% ก็สุ่มจากโน้ตทั้งหมดตามปกติ
                    this.state.currentNoteKey = notePool[Math.floor(Math.random() * notePool.length)];
                }
            } else {
                // ถ้าเป็นโหมด naturals ก็สุ่มจากโน้ตธรรมดาตามปกติ
                this.state.currentNoteKey = notePool[Math.floor(Math.random() * notePool.length)];
            }
            // --- จบตรรกะใหม่ ---

            this.state.isChecking = false;
            this.state.correctPitchStartTime = null;

            this.drawNote();

            if (this.state.currentMode === 'keyboard') {
                this.els.soundFeedbackContainer.classList.add('hidden');
                this.els.keyboardWrapper.classList.remove('hidden');
                this.createKeyboard();
            } else {
                this.els.soundFeedbackContainer.classList.remove('hidden');
                this.els.keyboardWrapper.classList.add('hidden');
                this.updateFeedback('เล่นโน้ตบนหน้าจอ!', 'cyan');
            }
        },

        drawNote() {
            const oldNote = this.els.staffContainer.querySelector('.note-wrapper');
            if (oldNote) oldNote.remove();
            if (!this.state.currentNoteKey) return;

            const noteData = this.config.NOTES[this.state.currentClef][this.state.currentNoteKey];
            if (!noteData) return;

            const noteWrapper = document.createElement('div');
            noteWrapper.className = 'note-wrapper';
            noteWrapper.style.top = `${noteData.y - 12}px`; // ใช้ค่า y ตรงๆ

            let noteName = this.state.currentNoteKey.slice(0, -1);
            const preference = this.state.accidentalPreference;
            if ((preference === 'accidentals' || preference === 'all') && noteName.includes('#')) {
                if (Math.random() < 0.5) {
                    const flatName = this.config.ENHARMONIC_MAP[noteName];
                    if (flatName) noteName = flatName;
                }
            }

            let accidentalHtml = '';
            if (noteName.includes('#')) {
                accidentalHtml = `<span class="note-accidental">♯</span>`;
            } else if (noteName.includes('b')) {
                accidentalHtml = `<span class="note-accidental">♭</span>`;
            }

            const isStemUp = noteData.y >= 100; // เปลี่ยนเงื่อนไขการกลับด้านของก้านโน้ต
            const noteHTML = `<div class="note-head ${isStemUp ? 'up' : 'down'}">${accidentalHtml}<div class="note-stem"></div></div>`;
            
            const noteDiv = document.createElement('div');
            noteDiv.innerHTML = noteHTML;

            if (noteData.l) {
                const ledgerLine = document.createElement('div');
                ledgerLine.className = 'ledger-line';
                noteWrapper.appendChild(ledgerLine);
            }
            
            noteWrapper.appendChild(noteDiv);
            this.els.staffContainer.appendChild(noteWrapper);
        },

        handleCorrectAnswer() {
            this.playSound(this.audio.correct);
            this.processAnswer(true);
        },
            
            handleIncorrectAnswer(message) {
                this.playSound(this.audio.incorrect);
                this.updateFeedback(message, 'red');
                this.processAnswer(false);
            },

        processAnswer(isCorrect) {
            if (!this.state.isGameActive) return;
            this.state.isChecking = true; // ตั้งสถานะว่ากำลังตรวจสอบคำตอบ (เกมหยุดชั่วคราว)

            if (isCorrect) {
                this.state.score++;
                const timeBonus = this.state.currentMode === 'sound' ? 2 : 1;
                this.state.timeLeft += timeBonus;
                
                // อัปเดตคะแนนและเวลาบนหน้าจอ
                this.els.score.textContent = this.state.score;
                this.els.timer.textContent = this.state.timeLeft;

                const noteEl = this.els.staffContainer.querySelector('.note-wrapper');
                if(noteEl) noteEl.classList.add('correct');
                
                // หน่วงเวลาเล็กน้อยแล้วสร้างโน้ตตัวต่อไป
                setTimeout(() => {
                    if (this.state.isGameActive) this.generateNewNote();
                }, 600); // เพิ่ม delay เล็กน้อยเพื่อให้เห็น feedback ชัดขึ้น
            } else {
                this.state.timeLeft -= 2;
                if (this.state.timeLeft < 0) this.state.timeLeft = 0;
                this.els.timer.textContent = this.state.timeLeft;
                
                setTimeout(() => {
                    this.state.isChecking = false; // คืนสถานะให้เกมดำเนินต่อ
                    if (this.state.isGameActive) this.generateNewNote();
                }, 1200);
            }
        },

            updateFeedback(message, color) {
                if (this.els.feedbackText) {
                    this.els.feedbackText.textContent = message;
                    this.els.feedbackText.className = `text-xl font-bold h-8 mb-2 text-${color}-400`;
                }
            },

            createKeyboard() {
                const container = this.els.keyboardContainer;
                if (!container) return;
                container.innerHTML = '';
                const notes = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
                const showLabels = this.els.inGameShowLabelsToggle.checked;

                notes.forEach(note => {
                    const key = document.createElement('div');
                    key.className = 'key white flex items-end justify-center p-2 text-lg';
                    key.dataset.note = note;
                    if (showLabels) key.textContent = note;
                    container.appendChild(key);
                });
                
                for (const sharp in this.config.ENHARMONIC_MAP) {
                    const key = document.createElement('div');
                    key.className = 'key black flex items-center justify-center text-sm';
                    key.dataset.note = sharp;
                    if (showLabels) {
                        key.innerHTML = `<div class="text-center leading-tight">${sharp}<br>${this.config.ENHARMONIC_MAP[sharp]}</div>`;
                    }
                    container.appendChild(key);
                }

                if (this.keyPressHandler) {
                    container.removeEventListener('click', this.keyPressHandler);
                }
                this.keyPressHandler = this.handleKeyClick.bind(this);
                container.addEventListener('click', this.keyPressHandler);
            },
            
            handleKeyClick(e) {
            if (!this.state.isGameActive || this.state.isChecking) return;
            const keyElement = e.target.closest('.key');
            if (!keyElement) return;

            // --- ส่วนที่เพิ่มเข้ามา ---
            // นำชื่อโน้ตจากปุ่ม (เช่น "C#") มารวมกับ Octave ที่ 4
            const noteToPlay = keyElement.dataset.note + '4'; 
            this.playPianoNote(noteToPlay);
            // --- จบส่วนที่เพิ่มเข้ามา ---

            this.state.isChecking = true;
            
            const selectedNote = keyElement.dataset.note;
            const correctNote = this.state.currentNoteKey.slice(0, -1);
            
            const isCorrect = (selectedNote === correctNote || this.config.ENHARMONIC_MAP[selectedNote] === correctNote || this.config.ENHARMONIC_MAP[correctNote] === selectedNote);
            
            keyElement.classList.add(isCorrect ? 'correct' : 'incorrect');

            if (isCorrect) {
                this.handleCorrectAnswer();
            } else {
                this.handleIncorrectAnswer('ผิด!');
            }
        },

            setAccidentalPreference(value) {
                this.state.accidentalPreference = value;
                this.els.accidentalSelector.querySelectorAll('button').forEach(btn => btn.classList.toggle('active', btn.dataset.value === value));
            },

            async setupPitchDetection() {
                try {
                    if (!this.state.audioContext) {
                        this.state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (this.state.audioContext.state === 'suspended') {
                        await this.state.audioContext.resume();
                    }
                    this.state.mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const source = this.state.audioContext.createMediaStreamSource(this.state.mediaStream);
                    this.state.analyser = this.state.audioContext.createAnalyser();
                    this.state.analyser.fftSize = 1024;
                    source.connect(this.state.analyser);
                    this.state.dataArray = new Float32Array(this.state.analyser.fftSize);
                    return true;
                } catch (err) {
                    console.error('Error setting up pitch detection:', err);
                    return false;
                }
            },
            
            stopPitchDetection() {
                if (this.state.pitchLoopId) cancelAnimationFrame(this.state.pitchLoopId);
                if (this.state.mediaStream) this.state.mediaStream.getTracks().forEach(track => track.stop());
                this.state.pitchLoopId = null;
                this.state.mediaStream = null;
            },
            
        getPitch() {
            if (!this.state.isGameActive || !this.state.analyser) return;
            this.state.analyser.getFloatTimeDomainData(this.state.dataArray);
            const frequency = this.autoCorrelate(this.state.dataArray, this.state.audioContext.sampleRate);

            if (frequency !== -1 && !this.state.isChecking) {
                this.checkPitch(frequency);
            }

            this.state.pitchLoopId = requestAnimationFrame(() => this.getPitch());
        },

        checkPitch(frequency) {
            const targetFreq = this.getTargetConcertFrequency();
            if (!targetFreq || this.state.isChecking) return;

            const heardNoteName = this.concertPitchToWrittenPitch(frequency);
            if (!heardNoteName) return; 

            const cents = 1200 * Math.log2(frequency / targetFreq);
            const tunerOffset = Math.max(-50, Math.min(50, cents));
            if (this.els.tunerIndicator) this.els.tunerIndicator.style.left = `calc(50% + ${tunerOffset}%)`;

            let feedbackMessage = `เสียงที่ได้ยิน: ${heardNoteName}`;
            let feedbackColor = 'amber';

            if (Math.abs(cents) < 20) {
                if(this.els.tunerIndicator) this.els.tunerIndicator.classList.add('correct-pitch');
                feedbackMessage += ' (ยอดเยี่ยม!)';
                feedbackColor = 'green';

                if (this.state.correctPitchStartTime === null) {
                    this.state.correctPitchStartTime = Date.now();
                } else if (Date.now() - this.state.correctPitchStartTime >= 500) {
                    this.state.isChecking = true; // <--- เพิ่มบรรทัดนี้เพื่อ "เหยียบเบรก" ให้เกม
                    this.handleCorrectAnswer();
                }
            } else {
                if(this.els.tunerIndicator) this.els.tunerIndicator.classList.remove('correct-pitch');
                this.state.correctPitchStartTime = null;

                if (cents > 20) {
                    feedbackMessage += ' (สูงไป 🔼)';
                } else if (cents < -20) {
                    feedbackMessage += ' (ต่ำไป 🔽)';
                }
            }
            
            this.updateFeedback(feedbackMessage, feedbackColor);
        },

            getTargetConcertFrequency() {
                const writtenNoteFreq = this.config.NOTE_FREQUENCIES[this.state.currentNoteKey];
                if (!writtenNoteFreq) return null;
                const midi = 69 + 12 * Math.log2(writtenNoteFreq / this.config.A4_FREQ);
                const concertMidi = midi + this.state.transposition;
                return this.config.A4_FREQ * Math.pow(2, (concertMidi - 69) / 12);
            },

            autoCorrelate(buf, sampleRate) {
                let SIZE = buf.length;
                let rms = 0;
                for (let i = 0; i < SIZE; i++) {
                    rms += buf[i] * buf[i];
                }
                rms = Math.sqrt(rms / SIZE);
                if (rms < 0.01) return -1; // ถ้าเสียงเบาไปข้ามเลย

                let r1 = 0, r2 = SIZE - 1;
                const thres = 0.2;
                for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
                for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
                buf = buf.slice(r1, r2);
                SIZE = buf.length;

                // ⚡ OPTIMIZATION: จำกัดการวนลูป (Max Lag) เพื่อไม่ให้ CPU มือถือค้าง
                const c = new Array(SIZE).fill(0);
                const maxLag = Math.min(SIZE, 1000); 
                
                for (let i = 0; i < maxLag; i++) {
                    let sum = 0;
                    for (let j = 0; j < SIZE - i; j++) {
                        sum += buf[j] * buf[j + i];
                    }
                    c[i] = sum;
                }

                let d = 0;
                while (d < maxLag - 1 && c[d] > c[d + 1]) d++;
                
                let maxval = -1, maxpos = -1;
                for (let i = d; i < maxLag; i++) {
                    if (c[i] > maxval) {
                        maxval = c[i];
                        maxpos = i;
                    }
                }
                if (maxpos === -1) return -1;
                
                let T0 = maxpos;
                const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
                if (x1 !== undefined && x2 !== undefined && x3 !== undefined) {
                    const a = (x1 + x3 - 2 * x2) / 2;
                    const b = (x3 - x1) / 2;
                    if (a) T0 = T0 - b / (2 * a);
                }
                
                return sampleRate / T0;
            },

        calculateFrequency(noteKey) {
            const noteNameOnly = noteKey.slice(0, -1);
            const octave = parseInt(noteKey.slice(-1), 10);
            const semitoneIndex = this.config.NOTE_NAMES.indexOf(noteNameOnly);
            if (semitoneIndex === -1) return null;

            const midiNumber = 12 * (octave + 1) + semitoneIndex;
            return this.config.A4_FREQ * Math.pow(2, (midiNumber - this.config.A4_MIDI) / 12);
        },

        precalculateFrequencies() {
            this.config.NOTE_FREQUENCIES = {}; // เริ่มจากออบเจ็กต์ว่างๆ
            for (const clef in this.config.NOTES) {
                for (const noteKey in this.config.NOTES[clef]) {
                    if (!this.config.NOTE_FREQUENCIES[noteKey]) {
                        this.config.NOTE_FREQUENCIES[noteKey] = this.calculateFrequency(noteKey);
                    }
                }
            }
        },
        concertPitchToWrittenPitch(frequency) {
            if (frequency <= 0) return null;
            
            // 1. แปลงความถี่ที่ได้ยิน (Concert) ไปเป็นเลข MIDI มาตรฐาน
            const concertMidiNum = Math.round(12 * Math.log2(frequency / this.config.A4_FREQ) + this.config.A4_MIDI);
            
            // 2. Transpose กลับ: นำเลข MIDI มาลบกับการตั้งค่า Transposition ของเครื่องดนตรี
            // (เช่น เครื่อง Bb ตั้งค่าไว้ -2, การลบออก (-(-2)) จะเท่ากับการบวก 2 ทำให้เสียงสูงขึ้น 1 คู่เสียงเต็ม)
            const writtenMidiNum = concertMidiNum - this.state.transposition; 

            // 3. แปลงเลข MIDI ที่ได้ (Written) กลับไปเป็นชื่อโน้ตและ Octave
            const noteIndex = writtenMidiNum % 12;
            const octave = Math.floor(writtenMidiNum / 12) - 1;
            
            return this.config.NOTE_NAMES[noteIndex] + octave;
        }
    };
    
// 3. ปรับปุ่มออกจากเกม (ใกล้ๆ บรรทัด 550)
const closeGameBtn = document.getElementById('close-game-btn');
if (closeGameBtn) {
    closeGameBtn.addEventListener('click', () => {
        const targetWindow = window.opener || window.parent;
        if (targetWindow) targetWindow.postMessage({ type: 'CLOSE_GAME' }, '*');
        window.close(); // สั่งปิดแท็บนี้
    });
}
const gameOverExitBtn = document.getElementById('exit-game-over-btn');
if (gameOverExitBtn) {
    gameOverExitBtn.addEventListener('click', () => {
        const targetWindow = window.opener || window.parent;
        if (targetWindow) targetWindow.postMessage({ type: 'CLOSE_GAME' }, '*');
        window.close(); // สั่งปิดแท็บนี้
    });
}
    PitchCommandGame.init();
</script>
