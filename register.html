<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก - ระบบยืมคืนเครื่องดนตรี</title>
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@1.5.10/css/pico.min.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <main class="container">
    <img src="assets/logo.png" alt="โลโก้วงดนตรี">
    <h1>สมัครสมาชิก</h1>
    <form id="register-form">
      <input type="email" id="reg-email" placeholder="อีเมล" required>
      <input type="password" id="reg-password" placeholder="รหัสผ่าน" required>
      <input type="text" id="reg-prefix" placeholder="คำนำหน้า" required>
      <input type="text" id="reg-firstname" placeholder="ชื่อ" required>
      <input type="text" id="reg-lastname" placeholder="นามสกุล" required>
      <input type="text" id="reg-nickname" placeholder="ชื่อเล่น">
      <input type="date" id="reg-birthdate" placeholder="วันเกิด">
      <input type="number" id="reg-age" placeholder="อายุ" readonly>
      <input type="text" id="reg-studentid" placeholder="รหัสนักเรียน">
      <input type="text" id="reg-class" placeholder="ชั้น" required>
      <input type="text" id="reg-phone" placeholder="เบอร์โทร">
      <input type="text" id="reg-lineid" placeholder="ไอดีไลน์">
      <select id="reg-group" required>
        <option value="">เลือกกลุ่มผู้ใช้</option>
        <option value="student">นักเรียนทั่วไป (ยืมได้ครั้งละ 1 ช.ม. และไม่สามารถยืมกลับบ้านได้)</option>
        <option value="club">สมาชิกชุมนุม (ยืมกลับบ้านได้, ไม่คำนวณชั่วโมงซ้อม, แต่การยืมที่โรงเรียนคำนวณเวลาซ้อม)</option>
        <option value="teacher">ครูอาจารย์ (ยืมได้, ไม่คำนวณชั่วโมง, มีกำหนดการคืน)</option>
        <option value="guest">บุคคลทั่วไป (ยืมได้, ไม่คำนวณชั่วโมง, มีกำหนดการคืน, ต้องยืนยันตัวตน)</option>
      </select>
      <input type="text" id="reg-maininstrument" placeholder="เครื่องเอก">
      <input type="file" id="reg-profileimage" accept="image/*">
      <button type="submit">สมัครสมาชิก</button>
    </form>
    <p>มีบัญชีแล้ว? <a href="index.html">เข้าสู่ระบบ</a></p>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    // คำนวณอายุอัตโนมัติเมื่อเลือกวันเกิด
    document.getElementById('reg-birthdate').addEventListener('change', function() {
      const birthdate = this.value;
      if (birthdate) {
        const today = new Date();
        const birth = new Date(birthdate);
        let age = today.getFullYear() - birth.getFullYear();
        const m = today.getMonth() - birth.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
          age--;
        }
        document.getElementById('reg-age').value = age;
      } else {
        document.getElementById('reg-age').value = '';
      }
    });
  </script>
  <script src="register.js"></script>
</body>
</html>
